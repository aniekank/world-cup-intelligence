oken app (WC-005). Every page is fully populated. The hollow snapshot is NOT cached, so a later switch/reload re-fetches and auto-upgrades to live once healthy.", "guards": "Confirm the console warns '[data] Live feed incomplete …' and that switching away and back re-attempts the live fetch."}, {"id": "XCUT-07", "area": "Cross-cutting", "title": "Graceful degradation: advanced metrics hidden/labeled on sources lacking them", "priority": "high", "precondition": "Compare a full-event edition (men-2022 StatsBomb) vs a basic-stats source (live SportMonks/API-Football and historical datahub).", "steps": ["On men-2022 open a player page, golden boot/rankings, /standings, /analytics — note xG/xA/progressive/pressures/touches-in-box values.", "Switch to live-2026 (or a datahub historical edition) and open the same surfaces."], "expected": "On a source WITHOUT advanced metrics, those metrics and their percentiles are HIDDEN or explicitly labeled 'not available for this source' — NOT shown as a uniform 0 / '0th percentile' weakness, and golden boot must not read 'xG 0', standings must not read 'xG 0.0/0.0' for every team (WC-016). datasetMeta().hasAdvancedMetrics / hasShotData drive the hiding; percentiles for all-zero metrics are omitted (getPlayerView skips a metric whose sorted column is uniformly 0).", "guards": "Datahub editions are pre-tracking (no xG); SportMonks plan may lack xG. The flag must be derived from data actually present, not hardcoded true."}, {"id": "XCUT-08", "area": "Cross-cutting", "title": "Early-tournament / zero-minutes data: no divide-by-zero, no uniform ranks", "priority": "medium", "precondition": "An edition where some players have 0 minutes / 0 stats (live-2026 early, or pre-tournament squads).", "steps": ["Open a player with 0 minutes (per-90 + percentiles).", "Open /rankings and /analytics where percentile peers may be sparse."], "expected": "Per-90 math uses minutes floored at 1 (no NaN/Infinity). Percentiles for a position with no qualifying (>=45 min) peers default sensibly (empty table → metric omitted or neutral 50), not every player ranked identically or shown as 0th percentile. Pages render without NaN/Infinity on screen.", "guards": "percentileTables only includes players with >=45 minutes; with none, the table is empty — surfaces must handle the empty table."}, {"id": "XCUT-09", "area": "Cross-cutting", "title": "Match event timelines across three code paths (live / just-finished / older-finished)", "priority": "medium", "precondition": "live-2026 with the events poller active (60s).", "steps": ["Open a LIVE match and watch across 1–2 refresh cycles.", "Open a match that just FINISHED.", "Open an OLDER finished match whose timeline was empty at first load."], "expected": "Live: timeline (goals, VAR/disallowed, cards, subs) grows each refresh. Just-finished: final events are captured. Older-finished: timeline is backfilled exactly once (capped at 8/tick) and not re-fetched thereafter (eventsFetched set). Scorers/teams resolve to real players; own-goal/VAR are surfaced (WC-015).", "guards": "Backfill must be one-time per match even when a finished match genuinely has no events."}, {"id": "XCUT-10", "area": "Cross-cutting", "title": "SportMonks team-code collisions and predictions stability on live data", "priority": "medium", "precondition": "live-2026 on SportMonks.", "steps": ["On /teams and /groups confirm Australia vs Austria and Iran vs Iraq are distinct teams.", "Open /predictions and /betting.", "Open /storylines / breakout discoveries."], "expected": "Australia (AUS) and Austria (AUT), Iran (IRN) and Iraq (IRQ) are separate teams with correct flags/groups (WC-017 uses real short_code). /predictions does not 500 on a group-base lookup gap (WC-018). Breakout does not flag 25-year-olds when SportMonks gives age 0 (requires 17<=age<=23) (WC-019). Betting Edge shows odds joined by team+kickoff date or an honest empty state, never a perpetual 'odds loading…' (WC-021).", "guards": ""}, {"id": "XCUT-11", "area": "Cross-cutting", "title": "Historical datahub editions populate teams grouped by confederation", "priority": "medium", "precondition": "Any datahub historical edition active (1930–2015).", "steps": ["Switch to several historical editions and open /teams each time.", "Open /matches and /history for the same edition."], "expected": "/teams is populated (grouped by confederation: UEFA/CONMEBOL/CAF/etc.) for every datahub edition — never empty (WC-020 regression: blank confederation filtered every team out). Matches/results render; advanced surfaces degrade gracefully (no xG).", "guards": "Each of the ~27 datahub editions should be spot-checked at least at the group/total level."}, {"id": "XCUT-12", "area": "Cross-cutting", "title": "Search form variations resolve in the UI across editions", "priority": "medium", "precondition": "A populated edition active.", "steps": ["From the topbar search, try: surname, full name, flipped order (last first), abbreviated 'F. Last', accented name, name prefix, a typo (one transposition), and a team code/alias.", "Repeat one or two on the live edition (abbreviated names)."], "expected": "Each form returns the correct primary entity (resolver shared by search + NLQ). No 500. Short tokens don't fuzzy-match unrelated names (kane↛Sané; holland↛Jun-Ho); typos within tolerance still resolve (halaand→Haaland). Abbreviated 'L. Messi' style names resolve on the live feed.", "guards": "Runner-up noise on multi-word names is a known cosmetic (WC-014); only flag if the PRIMARY result is wrong."}];
const LS = "wc-qa-results-v1";
let results = {};
try { results = JSON.parse(localStorage.getItem(LS) || "{}"); } catch(e){ results = {}; }
const esc = s => String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const save = () => localStorage.setItem(LS, JSON.stringify(results));
const st = id => (results[id]||{}).status || "untested";

// build area filter options
const areas = [...new Set(TESTS.map(t=>t.area))];
const fArea=document.getElementById("fArea");
areas.forEach(a=>{const o=document.createElement("option");o.value=a;o.textContent=a;fArea.appendChild(o);});

function render(){
  const list=document.getElementById("list"); list.innerHTML="";
  let cur=null,sec=null;
  TESTS.forEach(t=>{
    if(t.area!==cur){cur=t.area;
      sec=document.createElement("div");sec.className="area";
      const tot=TESTS.filter(x=>x.area===cur).length;
      const done=TESTS.filter(x=>x.area===cur&&st(x.id)!=="untested").length;
      sec.innerHTML=`<h2>${esc(cur)}<span class="ap">${done}/${tot} tested</span></h2>`;
      list.appendChild(sec);
    }
    const s=st(t.id); const notes=(results[t.id]||{}).notes||"";
    const el=document.createElement("div"); el.className="t"; el.dataset.id=t.id; el.dataset.status=s;
    el.dataset.area=t.area; el.dataset.prio=t.priority;
    el.dataset.text=(t.id+" "+t.title+" "+t.area+" "+t.expected).toLowerCase();
    el.innerHTML=`<div class="th"><span class="tid">${esc(t.id)}</span><span class="prio ${t.priority}">${t.priority}</span><span class="ttitle">${esc(t.title)}</span></div>
      ${t.precondition?`<div class="meta"><b>Precondition</b> · ${esc(t.precondition)}</div>`:""}
      <ol class="steps">${(t.steps||[]).map(x=>`<li>${esc(x)}</li>`).join("")}</ol>
      <div class="exp"><b>Expected</b> · <span class="v">${esc(t.expected)}</span></div>
      ${t.guards?`<div class="guards">⛨ ${esc(t.guards)}</div>`:""}
      <div class="actions">
        <button data-s="pass" class="${s==="pass"?"on":""}">✓ Pass</button>
        <button data-s="fail" class="${s==="fail"?"on":""}">✗ Fail</button>
        <button data-s="blocked" class="${s==="blocked"?"on":""}">🚧 Blocked</button>
        <button data-s="untested" class="${s==="untested"?"on":""}">clear</button>
      </div>
      <textarea placeholder="notes — what actually happened (failures export to BUGS.md)">${esc(notes)}</textarea>`;
    el.querySelectorAll(".actions button").forEach(b=>b.onclick=()=>{
      const v=b.dataset.s;
      if(v==="untested"){delete results[t.id];} else {results[t.id]={status:v,notes:(results[t.id]||{}).notes||""};}
      save(); el.dataset.status=st(t.id);
      el.querySelectorAll(".actions button").forEach(x=>x.classList.toggle("on",x.dataset.s===st(t.id)));
      updateBar(); refreshSectionCounts(); applyFilters();
    });
    el.querySelector("textarea").oninput=e=>{
      if(!results[t.id])results[t.id]={status:"untested"};
      results[t.id].notes=e.target.value; save();
    };
    sec.appendChild(el);
  });
  updateBar();
}
function refreshSectionCounts(){
  document.querySelectorAll(".area").forEach(sec=>{
    const cards=[...sec.querySelectorAll(".t")];
    if(!cards.length)return;
    const area=cards[0].dataset.area;
    const tot=TESTS.filter(x=>x.area===area).length;
    const done=TESTS.filter(x=>x.area===area&&st(x.id)!=="untested").length;
    const ap=sec.querySelector(".ap"); if(ap)ap.textContent=`${done}/${tot} tested`;
  });
}
function updateBar(){
  const n={pass:0,fail:0,blocked:0,untested:0};
  TESTS.forEach(t=>n[st(t.id)]++);
  const tot=TESTS.length;
  document.getElementById("bar").innerHTML=
    `<i class="pass" style="width:${100*n.pass/tot}%"></i><i class="fail" style="width:${100*n.fail/tot}%"></i><i class="blocked" style="width:${100*n.blocked/tot}%"></i>`;
  const tested=n.pass+n.fail+n.blocked;
  document.getElementById("counts").innerHTML=
    `<span>Progress <b>${tested}/${tot}</b> (${Math.round(100*tested/tot)}%)</span>
     <span class="c-pass">✓ ${n.pass} pass</span><span class="c-fail">✗ ${n.fail} fail</span>
     <span class="c-blocked">🚧 ${n.blocked} blocked</span><span class="c-untested">☐ ${n.untested} left</span>`;
}
function applyFilters(){
  const q=document.getElementById("q").value.toLowerCase().trim();
  const fa=fArea.value, fs=document.getElementById("fStatus").value, fp=document.getElementById("fPrio").value;
  document.querySelectorAll(".t").forEach(el=>{
    const ok=(!q||el.dataset.text.includes(q))&&(!fa||el.dataset.area===fa)&&(!fs||st(el.dataset.id)===fs)&&(!fp||el.dataset.prio===fp);
    el.classList.toggle("hidden",!ok);
  });
  document.querySelectorAll(".area").forEach(sec=>{
    const any=[...sec.querySelectorAll(".t")].some(el=>!el.classList.contains("hidden"));
    sec.classList.toggle("hidden",!any);
  });
}
["q","fArea","fStatus","fPrio"].forEach(id=>document.getElementById(id).addEventListener("input",applyFilters));
function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1600);}
document.getElementById("reset").onclick=()=>{if(confirm("Clear all results & notes?")){results={};save();render();applyFilters();}};
document.getElementById("exportJson").onclick=()=>{
  const out=TESTS.map(t=>({id:t.id,area:t.area,status:st(t.id),notes:(results[t.id]||{}).notes||""}));
  const blob=new Blob([JSON.stringify(out,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="qa-results.json";a.click();
};
document.getElementById("exportFail").onclick=()=>{
  const fails=TESTS.filter(t=>st(t.id)==="fail");
  if(!fails.length){toast("No failures logged 🎉");return;}
  const blocks=fails.map(t=>{
    const notes=(results[t.id]||{}).notes||"";
    return `### WC-XXX — ${t.title} (${t.id})
- **Area:** ${t.area}
- **Severity:** ${t.priority==="high"?"high":t.priority==="medium"?"medium":"low"}
- **Steps:** ${(t.steps||[]).join(" → ")}
- **Expected:** ${t.expected}
- **Actual:** ${notes||"<fill in what happened>"}
- **Test:** ${t.id}
- **Status:** Open`;
  });
  const text=blocks.join("\n\n");
  navigator.clipboard.writeText(text).then(()=>toast(fails.length+" failure(s) copied — paste into BUGS.md"),
    ()=>{const blob=new Blob([text],{type:"text/markdown"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="failures-for-BUGS.md";a.click();});
};
render(); applyFilters();
</script></body></html>
