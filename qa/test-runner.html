<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>WC Intelligence — QA Test Runner</title>
<style>
:root{--bg:#0a0b10;--panel:#12141c;--panel2:#171a24;--border:#262a38;--text:#dfe3ee;--muted:#888fa3;--bright:#f3f5fa;
--teal:#1fe5c4;--amber:#ffb01e;--red:#ff5470;--green:#5fd07a;--violet:#9b8cff;--blue:#4aa8ff;
--mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;--sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.55}
header{position:sticky;top:0;z-index:10;background:rgba(10,11,16,.93);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:16px 22px}
.brand{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--teal)}
h1{font-size:21px;margin:2px 0 10px;color:var(--bright)}
.bar{height:10px;border-radius:6px;background:var(--panel2);overflow:hidden;display:flex;border:1px solid var(--border)}
.bar i{display:block;height:100%}
.bar .pass{background:var(--green)}.bar .fail{background:var(--red)}.bar .blocked{background:var(--amber)}
.counts{display:flex;gap:14px;flex-wrap:wrap;margin-top:8px;font-size:13px;font-family:var(--mono)}
.counts b{color:var(--bright)}
.c-pass{color:var(--green)}.c-fail{color:var(--red)}.c-blocked{color:var(--amber)}.c-untested{color:var(--muted)}
.controls{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;align-items:center}
.controls input,.controls select{background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:7px 10px;font-size:13px;font-family:var(--mono)}
.controls input[type=text]{min-width:200px;flex:1}
button{cursor:pointer;font-family:var(--mono)}
.btn{background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:7px 12px;font-size:12px}
.btn:hover{border-color:var(--teal);color:var(--teal)}
main{max-width:1040px;margin:0 auto;padding:22px}
.area{margin:30px 0 0}
.area h2{font-size:16px;color:var(--bright);display:flex;align-items:center;gap:10px;border-top:1px solid var(--border);padding-top:18px}
.area h2 .ap{font-family:var(--mono);font-size:12px;color:var(--muted);margin-left:auto}
.t{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin:12px 0;border-left:3px solid var(--lc,var(--border))}
.t[data-status=pass]{--lc:var(--green)}.t[data-status=fail]{--lc:var(--red)}.t[data-status=blocked]{--lc:var(--amber)}
.th{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.tid{font-family:var(--mono);font-size:12px;color:var(--teal);font-weight:600}
.prio{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.06em;border:1px solid var(--border);border-radius:5px;padding:1px 7px}
.prio.high{color:var(--red);border-color:rgba(255,84,112,.4)}.prio.medium{color:var(--amber);border-color:rgba(255,176,30,.4)}.prio.low{color:var(--muted)}
.ttitle{color:var(--bright);font-weight:600;font-size:15px}
.meta{font-size:13.5px;margin:8px 0 0;color:var(--text)}
.meta b,.exp b{color:var(--muted);font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.05em}
ol.steps{margin:6px 0;padding-left:22px}ol.steps li{margin:3px 0;font-size:13.5px}
.exp{margin-top:8px;font-size:13.5px}
.exp .v{color:var(--bright)}
.guards{margin-top:7px;font-size:12px;color:var(--amber);font-family:var(--mono)}
.actions{display:flex;gap:7px;margin-top:12px;flex-wrap:wrap}
.actions button{border:1px solid var(--border);background:var(--panel2);color:var(--muted);border-radius:7px;padding:6px 14px;font-size:12px}
.actions button.on[data-s=pass]{background:var(--green);color:#06210f;border-color:var(--green)}
.actions button.on[data-s=fail]{background:var(--red);color:#2a0710;border-color:var(--red)}
.actions button.on[data-s=blocked]{background:var(--amber);color:#241800;border-color:var(--amber)}
textarea{width:100%;margin-top:9px;background:#0c0e15;border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 10px;font-size:13px;font-family:var(--sans);resize:vertical;min-height:38px}
.hidden{display:none!important}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--teal);color:#06210f;padding:10px 18px;border-radius:10px;font-family:var(--mono);font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}
::-webkit-scrollbar{width:11px;height:11px}::-webkit-scrollbar-thumb{background:#2a3040;border-radius:6px;border:2px solid var(--bg)}
</style></head><body>
<header>
  <div class="brand">TASK Enterprises · QA</div>
  <h1>World Cup Intelligence — Test Runner</h1>
  <div class="bar" id="bar"></div>
  <div class="counts" id="counts"></div>
  <div class="controls">
    <input type="text" id="q" placeholder="filter by id, title, area…">
    <select id="fArea"><option value="">all areas</option></select>
    <select id="fStatus"><option value="">all statuses</option><option value="untested">untested</option><option value="pass">pass</option><option value="fail">fail</option><option value="blocked">blocked</option></select>
    <select id="fPrio"><option value="">all priorities</option><option value="high">high</option><option value="medium">medium</option><option value="low">low</option></select>
    <button class="btn" id="exportFail">⤓ Copy failures as BUGS.md</button>
    <button class="btn" id="exportJson">⤓ Export results (JSON)</button>
    <button class="btn" id="reset">Reset</button>
  </div>
</header>
<main id="list"></main>
<div class="toast" id="toast"></div>
<script>
const TESTS = [{"id": "HOME-01", "area": "Home", "title": "Daily briefing headline reflects live count and favourite", "priority": "high", "precondition": "Active tournament with at least one LIVE match and forecasts populated (data source ready)", "steps": ["Open the home page (/)", "Read the 'Daily Intelligence Briefing' hero headline and body"], "expected": "Headline reads '<N> live now — <FavouriteTeam> lead the race through <phase>' where N equals the actual number of LIVE+HALFTIME matches and <phase> is e.g. 'the group stage (matchday 3)'. Body's first sentence names the model favourite with a percentage like 'remain the model's favourites at 12.3% to lift the trophy.' Body also contains '<N> matches are live right now.' matching the same N.", "guards": "Match-state handling — live count and phase must be derived from real fixture states, not hard-coded"}, {"id": "HOME-02", "area": "Home", "title": "Daily briefing falls back to safe content while forecasts load", "priority": "high", "precondition": "Within ~60s of a fresh deploy / live-load window: matches present but engine forecasts not yet computed", "steps": ["Open / during the live-load window (immediately after deploy)", "Read the briefing hero"], "expected": "Headline is exactly 'Tournament data is loading'. Body reads '<N> matches are live right now. Forecasts populate as soon as the feed is ready.' and the single bullet reads '<N> live • <M> still to play'. The page renders fully (HTTP 200 with real content) and does NOT throw or show a blank hero.", "guards": "Undefined lookups during live-load window — no forecast must not crash the briefing"}, {"id": "HOME-03", "area": "Home", "title": "Briefing bullets list concrete tournament facts", "priority": "medium", "precondition": "Active tournament with forecasts and a golden-boot leader present", "steps": ["Open /", "Inspect the row of Badge chips under the briefing body"], "expected": "First badge reads '<Favourite> — <pct>% to win it across 8,000 simulations'. A 'Golden Boot:' badge names the current leader with 'leads on <G> (proj. <P>)' OR reads 'Golden Boot race wide open' if none. Final badge reads '<finished> played • <live> live • <scheduled> to come' with counts matching the stat strip / live ticker.", "guards": "Match-state handling — counts must agree across briefing, stat strip, and ticker"}, {"id": "HOME-04", "area": "Home", "title": "Stat strip computes goals and xG from finished matches only", "priority": "high", "precondition": "Active tournament with a mix of FINISHED and non-finished matches", "steps": ["Open /", "Read the four stat tiles: Teams, Matches played, Goals, Total xG"], "expected": "Teams shows 48 with sub '12 groups'. 'Matches played' equals the count of FINISHED matches with sub '<allMatches> total'. 'Goals' equals the summed homeScore+awayScore over FINISHED matches only, with a '<x.xx> / match' sub (0.00 guard if zero played). 'Total xG' is the summed home+away xG over finished matches with a '/ team' sub. No NaN or Infinity appears even with zero matches played.", "guards": "Edge case — divide-by-zero guarded via Math.max(played,1)"}, {"id": "HOME-05", "area": "Home", "title": "Live & Upcoming panel renders up to 6 cards, live first", "priority": "high", "precondition": "Active tournament with both live and scheduled fixtures whose teams resolve", "steps": ["Open /", "Inspect the 'Live & Upcoming' panel (subtitle 'Final round of group fixtures')"], "expected": "At most 6 MatchCards shown, live matches appearing before upcoming. Live cards show a red LiveDot + '<minute>′' and current score; scheduled cards show the kickoff time (LocalTime) and 'vs' style with prediction ProbBar + home/draw/away percentages summing to ~100%. If there are zero live and zero upcoming, an EmptyState reads 'No scheduled matches.'", "guards": "Match-state handling — live vs scheduled rendered distinctly"}, {"id": "HOME-06", "area": "Home", "title": "Home does not crash when an upcoming fixture has an unresolved team", "priority": "high", "precondition": "Live-load window or a TBD/knockout fixture surfaces in data.upcoming with a homeTeamId/awayTeamId not yet in the team store", "steps": ["Open / while a scheduled fixture references a not-yet-loaded team id", "Observe the Live & Upcoming panel and the page as a whole"], "expected": "The page must render its other sections. NOTE/RISK: home page uses lookupTeam(id) with a non-null assertion (getTeam(id)!), so an unresolved team yields an undefined Team passed to MatchCard. MatchCard guards with 'if (!home || !away) return null', so the card is skipped rather than crashing — verify the unresolved card is simply absent and no React error boundary / 500-content appears. If the page shows an error, this is the bug.", "guards": "Undefined team lookups crashing during live-load / TBD knockout fixtures"}, {"id": "HOME-07", "area": "Home", "title": "'Matches that matter' cards rank by stakes and show edge + tags", "priority": "high", "precondition": "Active tournament with at least one SCHEDULED fixture whose teams resolve", "steps": ["Open /", "Locate the 'Matches that matter' panel (subtitle 'Upcoming fixtures ranked by what's at stake')", "Read each CriticalMatchCard"], "expected": "Up to 4 cards, ordered by descending stakes. Each card shows: stage/group label + kickoff (LocalTime clock variant with weekday), an edge readout '<CODE> <pct>%' (the favoured side's code) or 'too close' when even, both team flags/names separated by 'v', uppercase tag chips (e.g. 'GROUP A DECIDER', 'HEAVYWEIGHT CLASH', 'TOO CLOSE TO CALL'), and a blurb whose every claim is grounded (e.g. 'The model favours <Team> at <pct>%, with <x.x> goals expected.'). Panel is hidden entirely when there are no critical matches.", "guards": "Match-state handling — only SCHEDULED fixtures appear here, never live/finished"}, {"id": "HOME-08", "area": "Home", "title": "Critical-match blurb never references a TBD side as a real team", "priority": "medium", "precondition": "Knockout bracket partially populated; some knockout slots still TBD", "steps": ["Open /", "Read the blurbs on each 'Matches that matter' card"], "expected": "No card shows 'TBD' as a team name. criticalMatchesView filters out fixtures where either team is unresolved, so every card names two real teams. A fixture with a TBD slot must be absent, not rendered with the literal 'TBD'.", "guards": "Undefined team lookups on TBD/knockout fixtures"}, {"id": "HOME-09", "area": "Home", "title": "Live ticker marquee shows live matches first with pulsing dot", "priority": "medium", "precondition": "At least one LIVE or FINISHED match with resolved teams", "steps": ["Open /", "Inspect the top scrolling 'LIVE' ticker"], "expected": "Ticker shows live matches before finished ones. Live entries have a pulsing red dot and a '<minute>′' tag; finished entries show 'FT'. Each entry shows home flag/code, 'homeScore–awayScore', away code/flag. Content is duplicated for a seamless loop. Clicking an entry navigates to /matches/<id>.", "guards": "Match-state handling — LIVE vs FT label correctness"}, {"id": "HOME-10", "area": "Home", "title": "Live ticker is hidden when no live or finished matches exist", "priority": "low", "precondition": "Pre-tournament or all fixtures SCHEDULED (none live, none finished)", "steps": ["Open / before any match has kicked off", "Look for the LIVE ticker at the top"], "expected": "The ticker component renders nothing (returns null) — there is no empty ticker bar. The briefing hero becomes the first visible block.", "guards": "Edge case — empty live/finished set"}, {"id": "HOME-11", "area": "Home", "title": "Title contenders and right-rail widgets show grounded numbers", "priority": "low", "precondition": "Active tournament with forecasts, power rankings, golden boot, and insights computed", "steps": ["Open /", "Read 'Title Contenders', 'Power Rankings', 'Golden Boot Race', and 'AI Insights'"], "expected": "Title Contenders lists up to 6 teams with win-title percentages and a MetricBar; the top bar is the longest. Power Rankings lists top 5 with rank, team, and a power rating number. Golden Boot Race lists 5 players with 'currentGoals → projectedGoals' (player name falls back to playerId only if the view is missing). AI Insights shows up to 4 stories with a title and 2-line clamped body. No placeholder '0%' fills or empty names for resolved entities.", "guards": "Undefined player lookups — golden boot falls back to id, must still render"}, {"id": "LIVE-01", "area": "Live", "title": "In Play panel count matches the rendered live cards", "priority": "high", "precondition": "Active tournament with one or more LIVE matches whose teams resolve", "steps": ["Open /live", "Read the 'In Play' panel subtitle and count the cards"], "expected": "Subtitle reads '<N> matches live' where N equals liveMatches().length (only fixtures with BOTH teams resolved are counted/shown). The number of rendered MatchCards equals N. Each live card shows a red LiveDot + current '<minute>′' and the live score, not a kickoff time.", "guards": "Match-state handling + undefined team filtering"}, {"id": "LIVE-02", "area": "Live", "title": "Empty In-Play state shows guidance, not a blank panel", "priority": "high", "precondition": "No matches currently LIVE (between fixtures)", "steps": ["Open /live when nothing is in play", "Read the 'In Play' panel"], "expected": "Subtitle reads '0 matches live'. Body shows the EmptyState text exactly: 'No matches are live right now. Check the schedule below.' The 'Up Next' panel still lists scheduled fixtures below.", "guards": "Edge case — empty live set must not 500 or render blank"}, {"id": "LIVE-03", "area": "Live", "title": "HALFTIME match still shown as live on the live page card", "priority": "high", "precondition": "A match in HALFTIME status with resolved teams", "steps": ["Open /live with a match at half-time", "Inspect its card in 'In Play' (if liveMatches includes HALFTIME) and the displayed label"], "expected": "MatchCard treats HALFTIME as live (live = status LIVE or HALFTIME), so the card shows the LiveDot and the stored minute with the current score (not 'vs', not 'FT'). VERIFY liveMatches()/getLiveMatches() includes HALFTIME fixtures; if a half-time match is missing from In Play but appears nowhere else, flag it.", "guards": "Match-state handling — HALFTIME must not be mislabeled as scheduled or finished"}, {"id": "LIVE-04", "area": "Live", "title": "Up Next lists scheduled fixtures with prediction bars", "priority": "medium", "precondition": "Active tournament with SCHEDULED fixtures whose teams resolve", "steps": ["Open /live", "Inspect the 'Up Next' panel"], "expected": "Up to 9 scheduled fixtures, each as a MatchCard showing the LocalTime kickoff (no score; 'vs'-style) and a prediction ProbBar with home/draw/away percentages. Only fixtures with both teams resolved appear (TBD slots filtered out before slicing).", "guards": "Undefined team lookups on TBD fixtures"}, {"id": "LIVE-05", "area": "Live", "title": "Live refresh: score, minute, and status update without reload", "priority": "high", "precondition": "A match actively in play; page revalidates every 15s (export const revalidate = 15)", "steps": ["Open /live on an in-play match", "Note the current score and minute", "Wait through at least one revalidation cycle (>15s) during which a goal is scored or the minute advances", "Re-read the card"], "expected": "After revalidation the card reflects the new minute and/or updated score from the feed. The 'In Play' count updates if a match starts/ends. No stale snapshot lingers beyond the revalidate window.", "guards": "Live refresh — score/minute must advance; stale-index regression"}, {"id": "LIVE-06", "area": "Live", "title": "Match flipping to FINISHED leaves In Play and appears as FT", "priority": "high", "precondition": "A live match about to reach full time", "steps": ["Open /live with the match in play", "Wait for the feed to flip the match to FINISHED", "Re-read /live and the home ticker"], "expected": "Once FINISHED, the match drops out of the 'In Play' panel (count decremented). It no longer shows a live minute anywhere; on cards it shows 'FT' and the final score with the winner's name bolded. The match no longer appears in 'Up Next' either.", "guards": "Live refresh + match-state transition LIVE→FINISHED"}, {"id": "LIVE-07", "area": "Live", "title": "Live page survives the live-load window with hollow feed entries", "priority": "high", "precondition": "Immediately post-deploy: live feed returns fixtures whose team ids are not yet in the store", "steps": ["Open /live during the first ~60s after deploy", "Observe In Play and Up Next"], "expected": "liveMatches() and the upcoming map both filter to fixtures where home AND away resolve, so hollow entries are silently dropped. The page renders with whatever resolves (possibly an empty In Play with the EmptyState). No 'Cannot read properties of undefined' crash and no 500-content.", "guards": "Undefined team lookups crashing during live-load window"}, {"id": "MATCH-01", "area": "Matches", "title": "Matches list groups fixtures by calendar day with correct headers", "priority": "high", "precondition": "Active tournament with fixtures spanning multiple days", "steps": ["Open /matches", "Inspect the day-grouped panels"], "expected": "Each Panel groups matches sharing a kickoff date (kickoff.slice(0,10)), ordered chronologically. Panel title is the dayLabel for that date; subtitle is '<count> matches'. The header badges read '<liveCount> live' and '<played> played' matching the actual LIVE and FINISHED counts among listed (team-resolved) fixtures.", "guards": "Match-state handling — live/played counts must be accurate"}, {"id": "MATCH-02", "area": "Matches", "title": "TBD knockout fixtures are excluded from the matches list", "priority": "high", "precondition": "Bracket partially set; some knockout slots reference unresolved team ids", "steps": ["Open /matches", "Scan all day panels for any card showing a blank or 'TBD' team"], "expected": "No card with an undefined/TBD team appears — matchesView is filtered by getTeam(home) && getTeam(away) before rendering, and MatchCard non-null assertions only run on already-filtered fixtures. A knockout slot with a TBD side simply has no card. No crash.", "guards": "Undefined team lookups on TBD/knockout fixtures"}, {"id": "MATCH-03", "area": "Matches", "title": "Finished card bolds the winner; draw bolds neither", "priority": "medium", "precondition": "At least one FINISHED match that was decisive and one that was a draw", "steps": ["Open /matches", "Find a finished decisive match and a finished drawn match"], "expected": "Decisive: the winning team's row is bold/bright (winner = homeScore>awayScore for the home row, vice versa) and shows both scores plus 'FT'. Draw: neither team row is bolded as winner, both scores shown, 'FT'. If decided on penalties, a 'Penalties <h>–<a>' line appears below the scores.", "guards": "Match-state handling — winner styling must not mark a team in a draw"}, {"id": "MATCH-04", "area": "Matches", "title": "Kickoff times render in viewer's local zone with correct DAY", "priority": "high", "precondition": "A scheduled evening (UTC) fixture that crosses a day boundary in the viewer's timezone; viewer in a North-America zone (e.g. America/Los_Angeles)", "steps": ["Set the browser/OS timezone to America/Los_Angeles", "Open /matches and let the page hydrate", "Compare an evening-UTC fixture's day grouping vs the time shown on its card after mount"], "expected": "On first paint LocalTime shows the UTC-formatted time (deterministic, hydration-safe); after mount it swaps to the viewer's local zone (e.g. a 02:00 UTC kickoff shows as the previous evening local time). The card time reflects local zone. KNOWN TENSION: day-group panels are bucketed by the raw UTC date (kickoff.slice(0,10)), so a late-UTC fixture may sit under a UTC day header while its card shows the local (previous) day — verify whether the grouping day matches the displayed local day; a mismatch is the timezone bug.", "guards": "Timezone — correct local DAY not just time; server/client hydration"}, {"id": "MATCH-05", "area": "Matches", "title": "Match detail scoreboard shows correct state label per status", "priority": "high", "precondition": "Four fixtures available: one SCHEDULED, one LIVE, one HALFTIME, one FINISHED (all team-resolved)", "steps": ["Open /matches/<id> for each of the four states", "Read the center scoreboard block"], "expected": "SCHEDULED: shows LocalTime kickoff and a muted 'vs' instead of a score; prediction ProbBar + xG/O2.5/BTTS badges shown. LIVE: red LiveDot + '<minute>′' above the live 'home – away' score. FINISHED: 'Full time' label, final score, winner styling, no ProbBar. HALFTIME: NOTE — match detail only special-cases live/finished/scheduled; a HALFTIME status shows neither a minute, 'Full time', nor a kickoff time and DOES show the 'home – away' score (since not scheduled). Confirm this is intended; flag if half-time looks like a scheduled/blank state.", "guards": "Match-state handling — SCHEDULED vs LIVE vs HALFTIME vs FINISHED labels"}, {"id": "MATCH-06", "area": "Matches", "title": "Match report narrative never declares a winner mid-game", "priority": "high", "precondition": "A LIVE match (home leading) and a HALFTIME match available", "steps": ["Open /matches/<id> for the live match", "Read the 'Match Report' panel body", "Repeat for the half-time match"], "expected": "For LIVE: text begins 'Live — <minute>′: ' and uses present-tense state — '<Team> lead <a>–<b>' or 'it's level at <a>–<b>' — and NEVER 'won'. For HALFTIME: text begins 'Live — Half-time: '. Scorers (if any) appended as 'Scorers: <Name> <min>′, ...'. The words 'won' / 'Full time' must NOT appear for a non-finished match.", "guards": "Match-state handling — narrative must not say a team 'won' mid-game"}, {"id": "MATCH-07", "area": "Matches", "title": "Finished-match report states result and xG storyline correctly", "priority": "medium", "precondition": "A FINISHED decisive match and a FINISHED goalless draw, both with team stats", "steps": ["Open /matches/<id> for the finished decisive match", "Read 'Match Report'", "Repeat for the goalless draw"], "expected": "Decisive: '<Winner> won <h>-<a> at <venue>.' followed by 'Scorers: ...' and an 'Underlying numbers:' xG line ending '— the better side won' when the higher-xG team also won, else ', against the run of expected goals.' Goalless: 'It finished level 0-0 ... A goalless affair.' Possession/field-tilt sentence present. No present-tense 'lead'.", "guards": "Match-state handling — FINISHED summary correctness"}, {"id": "MATCH-08", "area": "Matches", "title": "Scheduled match shows preview 'What's at stake' instead of report", "priority": "medium", "precondition": "A SCHEDULED fixture with resolved teams and a prediction", "steps": ["Open /matches/<id> for a scheduled fixture", "Confirm which narrative panel appears"], "expected": "The 'What's at stake' panel (subtitle 'Why this one matters') is shown — NOT the 'Match Report' panel — because preview is non-null only for SCHEDULED. It lists uppercase stake tags and a grounded blurb (e.g. 'The model favours <Team> at <pct>%, with <x.x> goals expected.'). The 'vs' scoreboard and prediction badges are present.", "guards": "Match-state handling — SCHEDULED routes to preview, others to report"}, {"id": "MATCH-09", "area": "Matches", "title": "Event timeline renders goals, cards, subs, VAR and offside detail", "priority": "high", "precondition": "A LIVE or FINISHED match with a rich event list including GOAL, YELLOW/RED card, SUBSTITUTION, VAR, OWN_GOAL, PENALTY_MISS", "steps": ["Open /matches/<id> for the rich match", "Inspect the 'Timeline' panel (subtitle 'Key events')"], "expected": "Each row shows minute '<m>′', the correct emoji (⚽ goal/pen/own-goal, 🟨 yellow/second-yellow, 🟥 red, 🔁 sub, 📺 VAR, ❌ pen miss), and the scorer/player name. For VAR, OWN_GOAL, and PENALTY_MISS the detail string is appended after '— ' (e.g. VAR offside review text), since meaning lives in the detail. Home-team events are left-aligned, away-team events right-aligned (flex-row-reverse).", "guards": "Undefined player lookups — VAR/own-goal rows fall back to detail, not a crash"}, {"id": "MATCH-10", "area": "Matches", "title": "Event row falls back to detail when player is unresolved", "priority": "high", "precondition": "An event whose playerId is not in the store (live-load window) or is null (e.g. a VAR/team event)", "steps": ["Open /matches/<id> for a match with such an event", "Inspect the corresponding timeline row"], "expected": "EventRow uses getPlayer(playerId) which may return null; the row renders 'player?.name ?? event.detail' so it shows the event detail text instead of crashing. No 'undefined' literal and no thrown error. Verify a VAR/team event with no playerId still shows meaningful detail text.", "guards": "Undefined player lookups crashing during live-load"}, {"id": "MATCH-11", "area": "Matches", "title": "Empty timeline shows placeholder for a scheduled match", "priority": "low", "precondition": "A SCHEDULED match with no events yet", "steps": ["Open /matches/<id> for a not-yet-started fixture", "Read the Timeline panel"], "expected": "Timeline panel body shows centered text 'No events yet.' rather than an empty list or error.", "guards": "Edge case — empty events array"}, {"id": "MATCH-12", "area": "Matches", "title": "Live timeline grows as new events arrive", "priority": "high", "precondition": "A LIVE match; detail page is dynamic (force-dynamic)", "steps": ["Open /matches/<id> for an in-play match and note the number of timeline rows and current score", "Wait for a new goal/card/sub to occur and reload (or let revalidation refresh)", "Re-count the timeline rows"], "expected": "After a new event the timeline gains the corresponding row (with correct minute/emoji/player), the scoreboard minute advances, and a goal updates the live score. The 'Match Report' present-tense state updates accordingly (e.g. lead changes) and still never says 'won'.", "guards": "Live refresh — event timeline growing + minute/score advance"}, {"id": "MATCH-13", "area": "Matches", "title": "Match stats and shot maps shown only when stats exist", "priority": "medium", "precondition": "One match with full team stats and shots, one degraded-source match lacking team stats (e.g. datahub historical, no xG)", "steps": ["Open /matches/<id> for the full-stats match", "Open /matches/<id> for the degraded match"], "expected": "Full match: 'Match Stats' panel lists Possession%, Shots, On target, xG, Big chances, Corners, Field tilt%, Pass acc.%, PPDA, Fouls with a two-colour comparison bar; two Shot Map panels appear when shots exist, each titled '<Team> — Shot Map' with the shot count. Degraded match: when team stats are absent, the Match Stats panel and shot maps are omitted entirely (no zero-filled rows, no empty chart). Page still renders report/preview.", "guards": "Edge case — missing stats from degraded source must not render hollow widgets"}, {"id": "MATCH-14", "area": "Matches", "title": "Unknown or TBD match id returns notFound, not a broken page", "priority": "high", "precondition": "A match id that does not exist, and a knockout-fixture id whose teams are still TBD", "steps": ["Navigate to /matches/<nonexistent-id>", "Navigate to /matches/<tbd-knockout-id> (fixture exists but a team is unresolved)"], "expected": "Both trigger Next.js notFound() (matchDetail returns null when the match is missing OR either team is unresolved), rendering the 404 page — NOT a 200 page with undefined team crashes or empty 'undefined v undefined' titles.", "guards": "Undefined team lookups on TBD/knockout fixtures"}, {"id": "MATCH-15", "area": "Matches", "title": "Halftime score line and penalties display on scoreboard", "priority": "low", "precondition": "A match with non-zero half-time score and (separately) a knockout match decided on penalties", "steps": ["Open /matches/<id> for a match where homeScoreHT+awayScoreHT > 0", "Open /matches/<id> for a penalty-decided knockout match"], "expected": "When HT goals exist the scoreboard shows 'HT <h>–<a>' beneath the score. For a penalty result it shows 'pens <home>–<away>'. Neither appears (no '0–0 HT', no 'pens') when not applicable.", "guards": "Edge case — conditional scoreboard annotations"}, {"id": "STND-01", "area": "Standings", "title": "Group table ordering follows FIFA tiebreakers (points → GD → GF)", "priority": "high", "precondition": "A live/edition with at least one group where two teams are level on points.", "steps": ["Open /standings.", "Pick a group where the top teams share the same Pts value.", "Compare the displayed row order against the underlying results."], "expected": "Rows are sorted by Points descending; ties broken by Goal Difference descending, then Goals For descending. When still tied, head-to-head points/GD/GF among the tied teams decides, then fewer disciplinary points, then a stable team-id order. The rendered '#' column equals 1..N in that exact order with no duplicate or skipped ranks.", "guards": "Do not assume alphabetical or ELO order; verify against computeGroupStandings sort logic."}, {"id": "STND-02", "area": "Standings", "title": "GD column sign formatting (+N for positive, raw for 0/negative)", "priority": "medium", "precondition": "A group with teams having positive, zero, and negative goal differences.", "steps": ["Open /standings.", "Inspect the GD cell for a team with GD>0, one with GD=0, and one with GD<0."], "expected": "GD>0 shows a leading '+' (e.g. '+3'); GD=0 shows '0' (no '+'); GD<0 shows the negative value (e.g. '-2'). Values equal goalsFor minus goalsAgainst exactly.", "guards": "GD must equal GF-GA, not points-derived."}, {"id": "STND-03", "area": "Standings", "title": "Qualification status dots only appear once all 3 group games are played", "priority": "high", "precondition": "An edition mid-group-stage where at least one group has every team on played<3 and another group fully complete.", "steps": ["Open /standings.", "Find a group where every team has Pl<3.", "Find a group where every team has Pl=3."], "expected": "In the incomplete group all status dots render in the neutral 'bg-terminal-border' color (status=null). In the complete group, ranks 1-2 show the green Qualify dot (Q), rank 3 the amber Thirds-race dot (T), rank 4 the red Out dot (E).", "guards": "allPlayed gate requires played>=3 for EVERY team in the group, not just played matches existing."}, {"id": "STND-04", "area": "Standings", "title": "Early tournament (0 games played) does not rank everyone identically or divide-by-zero", "priority": "high", "precondition": "Switch to an edition/state where a group has 0 finished matches (all teams Pl=0, Pts=0, GD=0).", "steps": ["Open /standings before any group match has finished.", "Inspect the all-zero group's rows and the xG line."], "expected": "Table renders with Pl=0, Pts=0, GD=0 for all teams, ranks 1..4 assigned via the stable team-id fallback (no crash, no NaN). No status dots (all neutral). Q% may be present from the simulator but must be a finite percentage, never 'NaN%'. xG line shows '0.0 / 0.0' only if that source genuinely has xG=0 (see degradation case), otherwise blank.", "guards": "Per-team divisions (xG aggregation) must not divide by played; played can be 0."}, {"id": "STND-05", "area": "Standings", "title": "xG For/Against line reflects real summed xG, not placeholder zeros", "priority": "high", "precondition": "SportMonks/advanced-metrics edition (DATA_SOURCE=sportmonks) with finished matches.", "steps": ["Open /standings on the live-2026 advanced source.", "Read the 'xG x.x / y.y' line under a group with completed matches."], "expected": "Each team's xG For and xG Against are non-trivial decimals (one decimal place) summed across its matches, and differ team-to-team. A team that played and created chances shows xGFor>0. Values match the sum of m.teamStats[team].xG across that group's counted matches, rounded to 1 dp.", "guards": "Must NOT show '0.0 / 0.0' for every team when the source has xG."}, {"id": "STND-06", "area": "Standings", "title": "Graceful degradation: historical datahub editions hide/blank xG, never 0.0/0.0 for all", "priority": "high", "precondition": "Switch to a datahub historical edition (e.g. 1930-2015) which has no xG.", "steps": ["Switch the tournament to a datahub edition.", "Open /standings and inspect the xG line for every team across multiple groups."], "expected": "The xG For/Against column is hidden or blank for these editions. It must NOT render '0.0 / 0.0' uniformly for every team, which would falsely imply measured-zero xG. Points/GD/GF columns still populate correctly from real historical results.", "guards": "Distinguish 'no metric available' from 'metric measured as zero'."}, {"id": "STND-07", "area": "Standings", "title": "Best Third-Placed Teams ranking and top-8 qualify cutoff", "priority": "high", "precondition": "An edition in 48-team format with 12 groups and third-placed teams resolved.", "steps": ["Open /standings and scroll to 'Best Third-Placed Teams'.", "Verify ordering and the Qualifies/Out badges."], "expected": "Third-placed teams are ordered by Points desc, then GD desc, then GF desc, then fewer disciplinary points, then team-id. The first 8 rows are highlighted and show a green 'Qualifies' badge; rows 9+ show a red 'Out' badge. Rank numbers run 1..N.", "guards": "rankBestThirds uses goalDifference/goalsFor on the StandingRow, not raw accumulators."}, {"id": "STND-08", "area": "Standings", "title": "Live/halftime matches count toward played but not W/D/L until finished", "priority": "medium", "precondition": "An edition with at least one LIVE or HALFTIME group match.", "steps": ["Open /standings during a live group match.", "Inspect the two teams' Pl, W/D/L, GF/GA, and points."], "expected": "Both live teams' Pl is incremented and their current GF/GA (and xG) include the live match, but W/D/L counters and Points are NOT updated until the match is FINISHED. Form string does not yet show a letter for the in-progress game.", "guards": "countsAsPlayed includes LIVE/HALFTIME; points/result only on FINISHED."}, {"id": "GRP-01", "area": "Groups", "title": "Groups page W/D/L columns reconcile with Played and Points", "priority": "high", "precondition": "An edition with finished group matches.", "steps": ["Open /groups.", "For several teams verify W + D + L against Pl, and 3*W + D against Pts."], "expected": "For every row W+D+L equals the number of FINISHED games (<= Pl), and Points equals 3*W + D exactly. Pl may exceed W+D+L only when a LIVE/HALFTIME match is in progress.", "guards": "Points must never include live-match results."}, {"id": "GRP-02", "area": "Groups", "title": "Each group shows its own fixtures with correct home/away teams", "priority": "medium", "precondition": "Any edition with scheduled/finished group fixtures.", "steps": ["Open /groups.", "Cross-check the fixture rows under a group against that group's teams."], "expected": "Every fixture listed under a group involves only teams belonging to that group. Home/away flags and codes match the match's homeTeamId/awayTeamId. No fixture from another group leaks in.", "guards": "matchesView({groupId}) must filter by groupId; getTeam lookups must not crash on undefined (memory: no '!' assumptions)."}, {"id": "GRP-03", "area": "Groups", "title": "Q% on groups page matches the Monte Carlo reachR32 forecast", "priority": "medium", "precondition": "Forecasts computed for the active edition.", "steps": ["Open /groups and note a team's Q%.", "Open /standings and compare the same team's Q% and reachR32 value."], "expected": "The Q% on /groups equals pct(qualificationProbability) which is sourced from forecasts.reachR32 for that team, and is identical to the value on /standings. It is a finite 0-100% value, never 'NaN%' or blank.", "guards": "qualificationProbability is injected from the simulator, defaulting to 0 only if forecast missing."}, {"id": "GRP-04", "area": "Groups", "title": "Tournament switching refreshes group tables to the NEW edition", "priority": "high", "precondition": "At least two editions available in the switcher.", "steps": ["Open /groups on edition A and note the group names and teams.", "Switch to edition B via the tournament switcher.", "Reload/observe /groups."], "expected": "Group names, team rosters, fixtures, standings, and Q% all reflect edition B. No stale edition-A team, group, or forecast remains. (memory: indexes keyed to snapshot identity to avoid stale cross-instance data.)", "guards": "Verify no empty render after swap (stale-index bug class)."}, {"id": "RANK-01", "area": "Rankings", "title": "Power rankings sorted descending by powerRating with sequential ranks", "priority": "high", "precondition": "Active edition with forecasts computed.", "steps": ["Open /rankings.", "Read the Power column top to bottom and the '#' column."], "expected": "Power values are monotonically non-increasing down the table. The '#' rank column is 1..N with no gaps/dups. The top row's MetricBar is the widest. powerRating is bounded 0-100 (clamped).", "guards": "rows.sort by powerRating desc; rank = index+1."}, {"id": "RANK-02", "area": "Rankings", "title": "Trend arrows reflect rank change vs previous snapshot", "priority": "low", "precondition": "A previous-rank map exists (or defaults applied on first load).", "steps": ["Open /rankings.", "Inspect trend arrows next to several teams."], "expected": "Up arrow (green) when current rank < previousRank, down arrow (red) when rank > previousRank, flat dash when equal. On first computation with no previous data, all trends are flat (previousRank defaults to current rank).", "guards": "previous?.get default equals current rank, so no false up/down on cold start."}, {"id": "RANK-03", "area": "Rankings", "title": "Momentum is 0 for teams with no finished matches (early tournament)", "priority": "medium", "precondition": "Edition where some teams have played 0 finished matches.", "steps": ["Open /rankings before a team has any finished game.", "Read that team's Momentum cell."], "expected": "Momentum shows '0' (rendered neutral/muted) for teams with no finished matches — teamMomentum returns 0 when played.length is 0. No NaN. Momentum is an integer in [-100, 100].", "guards": "weight floor Math.max(weight,1) prevents divide-by-zero."}, {"id": "RANK-04", "area": "Rankings", "title": "Offense/Defense ratings use per-game xG without divide-by-zero at 0 games", "priority": "medium", "precondition": "Mix of teams with 0 and >0 finished games.", "steps": ["Open /rankings.", "Compare Offense/Defense for a 0-game team vs a multi-game team."], "expected": "All Offense/Defense values are finite numbers in [0,100] (clamped, 1 dp). For 0-game teams the games divisor is floored at 1 so xG-per-game is 0 and ratings collapse toward the rating-based baseline (~50 + attack/defense adjustment), not NaN.", "guards": "games = Math.max(played.length,1)."}, {"id": "RANK-05", "area": "Rankings", "title": "Degraded source (no xG) still produces sane power ranking, no NaN", "priority": "medium", "precondition": "Historical datahub edition without xG.", "steps": ["Switch to a datahub edition and open /rankings."], "expected": "Power, Offense, Defense, ELO, and Momentum all render finite numbers. xG terms contribute 0 (teamStats[...]?.xG ?? 0) rather than NaN. Ranking is driven by ELO tier + deep-run equity. No '0.0' uniform offense/defense for every team unless genuinely identical inputs.", "guards": "Missing xG must degrade to 0 contribution, not break the formula."}, {"id": "BRKT-01", "area": "Bracket", "title": "Unseeded/TBD knockout slots render 'TBD' and do not crash the engine", "priority": "high", "precondition": "Early tournament where qualifiers are not yet resolved (bracket must pad with placeholders).", "steps": ["Open /bracket before the group stage completes.", "Inspect R32 sides that have no resolved team."], "expected": "Empty slots show the white-circle flag '⚪' and the name 'TBD' with the seed label 'TBD'. No crash, no undefined-team error, no broken layout. homeTeamId/awayTeamId are null for those sides.", "guards": "memory: never use '!' on team lookups; buildBracket pads with {teamId:'',label:'TBD'} and Side falls back to 'TBD'."}, {"id": "BRKT-02", "area": "Bracket", "title": "Bye/one-sided ties advance the present side with 100%/0% probabilities", "priority": "high", "precondition": "A bracket node where exactly one side is TBD/empty and the other is a real team.", "steps": ["Open /bracket.", "Find a tie with one real team and one TBD."], "expected": "The real team's advance probability shows 100% and TBD shows 0% (homeProb=1 when only home present, 0 when only away present). The real team is highlighted as winner; TBD is never marked winner (winner flag requires a non-null team).", "guards": "homeProb set to 1/0 for single-sided slots; winner flag gated by !!node.home/!!node.away."}, {"id": "BRKT-03", "area": "Bracket", "title": "Each tie's two advance probabilities sum to ~100%", "priority": "high", "precondition": "Any populated bracket.", "steps": ["Open /bracket.", "For several ties add homeAdvanceProb + awayAdvanceProb."], "expected": "homeAdvanceProb + awayAdvanceProb ≈ 1.000 (each rounded to 3dp; displayed percentages sum to ~100%). For two real teams both are strictly between 0 and 1 derived from eloExpectation. No NaN/undefined probabilities.", "guards": "awayAdvanceProb computed as 1-homeProb."}, {"id": "BRKT-04", "area": "Bracket", "title": "Winner propagation: each round's sides are prior round's projected winners", "priority": "medium", "precondition": "A fully or partially populated bracket.", "steps": ["Open /bracket.", "Trace a R32 winner into R16, then QF, etc., via feedsInto slots."], "expected": "The higher-probability side of each tie (homeProb>=0.5 → home, else away) appears as a side in the node its slot feedsInto. The Final has a single tie fed by both SF winners. Tree is fully connected with no orphan slots.", "guards": "winner = homeProb>=0.5 ? home : away; nextSlot wiring."}, {"id": "BRKT-05", "area": "Bracket", "title": "Bracket stage set adapts to format and matches the simulator", "priority": "low", "precondition": "Editions of differing sizes (e.g. 8-group=16-team KO vs 12-group=32-team KO).", "steps": ["Open /bracket on a 12-group edition (expect R32 start).", "Switch to an 8-group/16-team-KO edition and reopen /bracket."], "expected": "12-group edition starts at R32 (16 ties) through FINAL. A smaller format starts at the correct stage (e.g. R16) and omits R32 — only stages with size<=bracketSize appear. Stage headers and node counts match the bracket size.", "guards": "ALL_STAGES filtered by size<=bracketSize."}, {"id": "BRKT-06", "area": "Bracket", "title": "Bracket reflects NEW edition after tournament switch (no stale teams)", "priority": "high", "precondition": "Two editions with disjoint team sets.", "steps": ["Open /bracket on edition A; note resolved teams.", "Switch to edition B and reopen /bracket."], "expected": "All bracket sides show edition-B teams (or TBD); no edition-A team flag/name remains. Probabilities recomputed from edition-B ELOs. No empty/blank tree from a stale snapshot index.", "guards": "Snapshot identity must drive the rebuild (stale-index bug class)."}, {"id": "PRED-01", "area": "Predictions", "title": "Title odds across all teams sum to ~100%", "priority": "high", "precondition": "Forecasts computed for active edition.", "steps": ["Open /predictions.", "Sum winTitle across ALL teams (not just the top 12 shown), via the data source if needed."], "expected": "Sum of every team's winTitle ≈ 1.0 (100%), within Monte Carlo rounding tolerance (~±1%). Each winTitle is a finite probability in [0,1]; the top-12 championship bar chart values are a subset that must be <= the total and individually plausible (favorite single-digit-to-low-double-digit %).", "guards": "Exactly one champion per run over RUNS=8000; no NaN."}, {"id": "PRED-02", "area": "Predictions", "title": "Stage-reach probabilities are monotonically non-increasing per team", "priority": "high", "precondition": "Forecasts computed.", "steps": ["Open /predictions, Stage-Reach Probabilities table.", "For each listed team read R16, QF, SF, Final, Win."], "expected": "For every team reachR16 >= reachQF >= reachSF >= reachFinal >= winTitle (a team can't reach a later round more often than an earlier one). All are finite percentages 0-100, none NaN/blank. Win column uses 1-decimal precision.", "guards": "markSize tallies are nested, so reach probabilities must be ordered."}, {"id": "PRED-03", "area": "Predictions", "title": "Match prediction win/draw/away sum to ~100% with sane scorelines", "priority": "high", "precondition": "Any non-finished match prediction is surfaced (match detail or predictions context).", "steps": ["Open a match prediction (homeWin, draw, awayWin and top scorelines).", "Add the three outcome probabilities and inspect the scoreline list."], "expected": "homeWin + draw + awayWin ≈ 1.000 (normalized Poisson matrix). The top-6 scorelines are sorted by probability descending, each a non-negative prob, and the most-likely scoreline is consistent with expected goals (e.g. favorite-leaning). expectedGoals.home/away are positive (>=0.18 floor). No NaN.", "guards": "scoreMatrix is normalized (truncation correction); round3 outputs."}, {"id": "PRED-04", "area": "Predictions", "title": "Golden Boot projection ordering, projected>=current, and win-boot normalization", "priority": "high", "precondition": "Players with goals/xG for the active edition.", "steps": ["Open /predictions, Golden Boot Projection table.", "Verify ordering by Proj. desc, compare Proj vs G, and sum Win Boot across contenders."], "expected": "Rows ordered by projectedGoals desc (then win prob). No goalkeepers appear (GK filtered). Projected goals >= current goals for each player (future goals are non-negative). Win-Boot probabilities are normalized so they sum to ~100% across all contenders; each is finite 0-100%.", "guards": "winProbability normalized by total; contenders filter excludes GK and low-xG non-scorers."}, {"id": "PRED-05", "area": "Predictions", "title": "Over-/Under-Performers delta equals Now minus Pre-WC", "priority": "medium", "precondition": "preTournamentTitleOdds present per team.", "steps": ["Open /predictions, Over- & Under-Performers panel.", "For listed teams compute Now - Pre-WC and compare to the Δ badge."], "expected": "Δ badge equals winTitle minus preTournamentTitleOdds (titleProbabilityDelta), green '+' when >=0, red when <0. The panel shows the top-5 risers and bottom-5 fallers sorted by delta. Pre-WC and Now are finite percentages.", "guards": "titleProbabilityDelta = round3(winTitle - preTournamentTitleOdds)."}, {"id": "PRED-06", "area": "Predictions", "title": "No NaN/undefined anywhere on predictions at 0-games / cold start", "priority": "high", "precondition": "Edition state before any match has finished.", "steps": ["Open /predictions immediately at tournament start.", "Scan championship chart, stage-reach table, performers, and golden boot."], "expected": "All probabilities render as finite percentages; title odds still sum to ~100%; stage-reach still monotonic; golden boot may be sparse (only players with goals>0 or xG>1) but every shown value is finite. No 'NaN%', 'undefined', or blank numeric cells.", "guards": "Simulator runs from base=0; expectedRemainingGames falls back to groupGamesLeft when forecast missing."}, {"id": "PRED-07", "area": "Predictions", "title": "Predictions reflect NEW edition after tournament switch (no stale forecasts)", "priority": "high", "precondition": "Two editions with different favorites.", "steps": ["Open /predictions on edition A; note the championship favorite and golden-boot leader.", "Switch to edition B and reopen /predictions."], "expected": "Championship bar chart, stage-reach table, performers, and golden boot all show edition-B teams/players and recomputed odds. No edition-A favorite or player lingers; title odds for B still sum to ~100%.", "guards": "Engine snapshot cleared on store.setDataset; stale-index bug class."}, {"id": "PRED-08", "area": "Predictions", "title": "Golden Boot degrades gracefully on sources without xG", "priority": "low", "precondition": "Historical/degraded edition with goals but no xG.", "steps": ["Switch to a datahub edition and open /predictions Golden Boot panel."], "expected": "xG column is blank/zeroed without breaking projection; projection falls back toward actual goals (goalRate90 blend still finite). Win-Boot probs remain normalized to ~100%. The contender filter (goals>0 or xG>1) means players surface via real goals, not phantom xG.", "guards": "currentXG ?? handling; projection must not NaN when xG=0."}, {"id": "TEAM-01", "area": "Teams", "title": "Teams list groups every nation under its confederation in fixed order", "priority": "high", "precondition": "Active dataset is the live-2026 edition (DATA_SOURCE=sportmonks) with all 48 nations loaded.", "steps": ["Navigate to /teams.", "Observe the panel headers from top to bottom.", "Within one panel, note the confederation label and the teams listed beneath it.", "Cross-check 2-3 teams against a known mapping (e.g. Brazil under CONMEBOL, Japan under AFC)."], "expected": "Panels render in the order UEFA, CONMEBOL, CONCACAF, CAF, AFC, OFC (only confederations that have teams). Each team appears under exactly one panel matching its confederation. Each panel subtitle shows the correct team count. No team is missing or duplicated across panels.", "guards": "CONF_ORDER drives ordering and groups with zero teams are dropped; assert the union of all panels equals the full team list."}, {"id": "TEAM-02", "area": "Teams", "title": "Teams actually render on a HISTORICAL edition (confederation grouping must not empty the page)", "priority": "high", "precondition": "Switch the active tournament to a historical datahub edition (e.g. men-1930 or men-1986) via the tournament switcher.", "steps": ["Switch to a historical edition.", "Navigate to /teams.", "Confirm at least one confederation panel is present and populated with team cards."], "expected": "At least one populated confederation panel renders with clickable team cards. The page is NOT empty. This guards the regression where confederation grouping emptied the entire /teams page on historical editions.", "guards": "Repeat for both a live edition (TEAM-01) and a historical edition; both must show teams. If a historical source lacks confederation tagging, teams must still appear under some grouping rather than vanishing."}, {"id": "TEAM-03", "area": "Teams", "title": "Team card shows group, FIFA rank, power rank badge, and title odds", "priority": "medium", "precondition": "On /teams for the live edition.", "steps": ["Pick a top-ranked team card.", "Read the secondary line (Group X · FIFA #N).", "Confirm the power-rank badge (#rank) is present when a power ranking exists.", "Read the Title odds percentage and confirm the metric bar width tracks it."], "expected": "Group id and FIFA ranking are shown. Power-rank badge appears only when powerRanking is present (absent, not '#undefined', when missing). Title odds render as a percentage; bar reflects the value (scaled to max 15%). A team with 0/undefined forecast shows 0% rather than NaN/blank.", "guards": "forecast?.winTitle ?? 0 must yield 0%, never NaN, when the forecast is missing."}, {"id": "TEAM-04", "area": "Teams", "title": "Team detail header shows manager, ELO, FIFA rank and power rank correctly composed", "priority": "medium", "precondition": "Open a live-edition team with a known manager and ELO.", "steps": ["Navigate to /teams/[id] for that team.", "Read the subtitle line under the team name.", "Verify each present field is joined by ' · ' with no empty segments."], "expected": "Subtitle shows 'Managed by <name>' only when manager is set and not '—', 'FIFA #N' only when fifaRanking is truthy, 'ELO <value>' always, and 'Power rank #N' only when powerRanking exists. No stray ' · · ' separators or 'Managed by —'.", "guards": "Falsy fields are filtered out before join; a source with no manager must not print 'Managed by undefined'."}, {"id": "TEAM-05", "area": "Teams", "title": "Team detail squad table groups players by position GK→DF→MF→FW with stats", "priority": "medium", "precondition": "Open a team detail page with a full squad.", "steps": ["Scroll to the Squad panel.", "Read down the Pos column.", "Confirm rows are ordered GK first, then DF, MF, FW.", "Spot-check a player's number, age, OVR, minutes, goals, assists, xG."], "expected": "Players appear grouped strictly in GK, DF, MF, FW order. Each row shows shirt number, detailed position, age, overall rating, minutes, goals, assists, and xG (1 decimal). Squad panel subtitle count equals the number of rendered rows.", "guards": "positions.flatMap order is fixed; a player with an unrecognised position would be silently dropped — assert rendered row count equals squad length."}, {"id": "TEAM-06", "area": "Teams", "title": "Team detail tournament outlook + group position render real Monte Carlo values", "priority": "medium", "precondition": "Open a team that has a forecast and a standing.", "steps": ["Read the six Tournament Outlook rows (Qualify R32 → Champions).", "Confirm each percentage is monotonically non-increasing down the funnel for a normal team.", "Read the Group Position panel: rank ordinal, points, W-D-L, goals, xG, qualification probability."], "expected": "Outlook percentages render (0% when forecast missing, not NaN). Group panel shows ordinal rank (1st/2nd...), points, correct W-D-L/goals split, xG to 1 decimal, and a qualification probability percentage. Qualified/Thirds race/Eliminated badge matches status Q/T/E.", "guards": "When standing is null the panel shows 'No group data.' rather than crashing on s.rank."}, {"id": "TEAM-07", "area": "Teams", "title": "Team detail fixtures rows resolve home/away teams without crashing mid-load", "priority": "high", "precondition": "Open a team detail page during the live-load window (snapshot may be swapping).", "steps": ["Navigate to a team detail page immediately after a tournament switch / live refresh.", "Observe the Fixtures panel rows."], "expected": "Each fixture row renders both opponents. The page does not throw even though MiniMatchRow uses getTeam(m.homeTeamId)! — i.e. once the snapshot is consistent every referenced team resolves. If a match references an unresolved team the page must not white-screen.", "guards": "Regression watch: non-null assertions on getTeam in fixtures can crash during the live-load window before indexes self-heal to the new snapshot."}, {"id": "TEAM-08", "area": "Teams", "title": "Unknown team id returns notFound, not a crash", "priority": "low", "precondition": "App running on any edition.", "steps": ["Navigate to /teams/this-id-does-not-exist.", "Observe the response."], "expected": "The Next.js notFound() 404 page renders. No 500 / stack trace.", "guards": "teamView returns undefined → notFound()."}, {"id": "TEAM-09", "area": "Teams", "title": "Degraded source: team xG column shows graceful value, not fabricated numbers", "priority": "medium", "precondition": "Switch to a historical/datahub edition that lacks xG (degraded, no advanced metrics).", "steps": ["Open a team detail page.", "Read the squad table xG column and the Group Position xG stat."], "expected": "On a source without xG, xG values are 0.0 uniformly (and must not be presented as a meaningful ranking). The page renders without implying these are real measured xG numbers; no NaN.", "guards": "hasAdvancedMetrics=false; xG should be visibly inert (all 0.0) rather than randomly fabricated."}, {"id": "PLYR-01", "area": "Players", "title": "Players list defaults to sort by goals (descending)", "priority": "high", "precondition": "On /players for the live edition; default controls untouched.", "steps": ["Navigate to /players and wait for 'Loading players…' to clear.", "Read the G (goals) column top to bottom for the first ~15 rows."], "expected": "Sort selector defaults to 'Goals'. Rows are ordered by goals descending (the top scorer is row 1). The leading '#' column is a 1-based display index, not a stored rank.", "guards": "Default sort state is 'goals'; API called with sort=goals."}, {"id": "PLYR-02", "area": "Players", "title": "Position filter chips and sort selector re-query and reset the visible window", "priority": "medium", "precondition": "On /players.", "steps": ["Click the 'Forwards' position chip.", "Confirm only FW players are listed.", "Change Sort to 'Assists'.", "Confirm ordering switches to assists-descending and the list resets to the first 80.", "Click 'Show more' and confirm 120 more rows append."], "expected": "Position chip filters rows to the selected position only. Sort change re-fetches and reorders. Changing filter/sort/query resets visible window to 80. 'Show more' increases the window by 120 and only appears while filtered.length > visible.", "guards": "visible resets to 80 on [position, sort, query] change."}, {"id": "PLYR-03", "area": "Players", "title": "Name filter is case-insensitive substring and shows empty-state when no match", "priority": "low", "precondition": "On /players with data loaded.", "steps": ["Type a known surname in lowercase into the name filter.", "Confirm matching players appear and the 'Showing X of Y' count updates.", "Type a nonsense string (e.g. 'zzzzzz').", "Observe the table body."], "expected": "Filter matches case-insensitively on substring. With no matches the table shows 'No players match your filters.' (not a blank table or spinner). The count line reads 'Showing 0 of 0'.", "guards": "Empty result must render the explicit no-match row, distinct from the loading row."}, {"id": "PLYR-04", "area": "Players", "title": "Players list xG/xA columns default to 0.0 safely", "priority": "medium", "precondition": "On /players for a source that may omit xG/xA.", "steps": ["Inspect the xG and xA columns for several rows.", "Include a player with no recorded shots/minutes."], "expected": "xG and xA render to 1 decimal, falling back to 0.0 via (xG ?? 0) when the field is missing. No NaN, undefined, or blank cells.", "guards": "(p.stats.xG ?? 0).toFixed(1) guards missing advanced metrics."}, {"id": "PLYR-05", "area": "Players", "title": "Player detail per-90 / percentile bars do not divide-by-zero at 0 minutes", "priority": "high", "precondition": "Open a player who has 0 minutes played (early tournament or unused squad member).", "steps": ["Navigate to /players/[id] for a 0-minute player.", "Inspect the Percentile Rankings bars and the radar chart.", "Inspect the headline Stat tiles (Goals/Assists/xG/xA/Minutes)."], "expected": "Page renders with no NaN/Infinity. Per-90 uses minutes floored to 1 internally so values are finite. Minutes tile reads 0. Percentile bars render finite widths (0-100). The player is not crashed out, and not ranked identically to everyone.", "guards": "per90 uses Math.max(stats.minutes, 1); emptyStatsFor supplies zeros when no stats row exists."}, {"id": "PLYR-06", "area": "Players", "title": "Percentiles never rank everyone identically when a metric is uniformly zero", "priority": "high", "precondition": "Active source lacks an advanced metric (e.g. pressuresApplied all zero across the field).", "steps": ["Open a player detail page on that source.", "Look for a Pressures / Prog. passes / xA row in Percentile Rankings and the radar axes."], "expected": "Metrics that are uniformly 0 across all positional peers are OMITTED entirely from percentile rows and the radar (not shown as a false 0th-percentile weakness). Metrics that DO vary still show a real percentile. The radar only plots axes that exist in p.percentiles.", "guards": "store omits a metric when sorted[0]===0 && sorted[last]===0 (WC-016). percentileRows/radarDef filter on percentiles[key] != null."}, {"id": "PLYR-07", "area": "Players", "title": "Modeled metrics (xA) are labeled '(est.)' in radar, percentile rows, and scouting traits", "priority": "medium", "precondition": "Active source lists xA (and any other modeled key) in datasetMeta().modeledMetrics.", "steps": ["Open a player whose source models xA.", "Read the radar axis labels, the Percentile Rankings row labels, and the Scouting Report strengths/weaknesses wording."], "expected": "Every modeled metric label carries the '(est.)' suffix (e.g. 'xA (est.)', 'creativity (xA) (est.)'). Measured metrics have no suffix. The suffix is consistent across radar, percentile list, and scouting text.", "guards": "est(base, key) appends '(est.)' iff key ∈ modeledMetrics; applied in page.tsx and narratives.ts."}, {"id": "PLYR-08", "area": "Players", "title": "Advanced metrics are HIDDEN on sources that lack them (no fabricated weakness)", "priority": "high", "precondition": "Switch to a degraded source (hasAdvancedMetrics=false, e.g. datahub historical).", "steps": ["Open a player detail page.", "Inspect Percentile Rankings, the radar, and the Scouting Report development areas."], "expected": "xG, xA, progressive passes/carries, pressures rows are absent from the percentile list and radar. The scouting 'Development areas' never lists an advanced metric as a 0th-percentile weakness. If no advanced traits qualify, weaknesses falls back to 'No glaring weaknesses in the sample.'", "guards": "Both store-level omission and the label filter prevent advanced metrics from surfacing as fake weaknesses on degraded sources."}, {"id": "PLYR-09", "area": "Players", "title": "Player detail age/height fields only show when known; unknown age (0) is hidden", "priority": "medium", "precondition": "Open a player from a source where age/height may be 0/unknown.", "steps": ["Open /players/[id] for a player with age=0 and/or heightCm=0.", "Read the metadata subtitle line under the name."], "expected": "'Age N' is shown only when age is truthy; '<n>cm' only when heightCm is truthy. A player with unknown age shows no 'Age 0'. Foot is always shown. No empty ' · · ' separators.", "guards": "p.age ? `Age ${p.age}` : null and p.heightCm ? ... : null filter falsy values before join."}, {"id": "PLYR-10", "area": "Players", "title": "Breakout/young-player flag triggers only for KNOWN ages 17–23, never a 25-year-old or age 0", "priority": "high", "precondition": "Active edition has insights/storylines surfaced (home/discoveries pages reference breakout & 'Breakout Star').", "steps": ["Open the insights/storyline surface that lists breakout players.", "For each flagged 'breakout'/'Breakout Star' entry, read the displayed age.", "Confirm no player aged 24+ is flagged as breakout.", "On a source where age is unknown (0), confirm no breakout entries are produced from those players."], "expected": "Breakout insights only include players with age between 17 and 23 (storylines bucket 17–22) AND minutes ≥ 90. A 25-year-old is never flagged. An age-0/unknown player is never flagged as a young breakout, since 0 fails the >=17 lower bound.", "guards": "narratives breakout filter: age >= 17 && age <= 23 && minutes >= 90; storylines breakout: age 17–22. The lower bound is what prevents age-0 from passing."}, {"id": "PLYR-11", "area": "Players", "title": "Player whose team is mid-resolving does not crash the detail page", "priority": "high", "precondition": "Trigger a player view during the live-load window where the player's team may not yet be in the index.", "steps": ["Open /players/[id] right as the dataset snapshot swaps (tournament switch / live refresh).", "Confirm the page either renders fully or 404s — never throws."], "expected": "getPlayerView returns undefined when the team is unresolved, so the player is omitted from list views and the detail page resolves to notFound() rather than crashing. No 'cannot read property of undefined' on team. Once the snapshot is consistent the page renders normally.", "guards": "getPlayerView: `const team = getTeam(player.teamId); if (!team) return undefined;` — never use ! on team lookups."}, {"id": "PLYR-12", "area": "Players", "title": "Scouting report summary degrades cleanly with missing club/value/age", "priority": "low", "precondition": "Open a player with club='—', marketValueEur=0, age unknown.", "steps": ["Read the Scouting Report summary sentence and the badges below it."], "expected": "Summary omits the club parenthetical when club is '—', omits the age prefix when age is 0, and omits the market-value sentence when value is 0. The 'Market value' badge is hidden when marketValueEur <= 0. No '€0m' or '(—)' artifacts.", "guards": "agePart/clubPart/valuePart conditionals; market badge gated on marketValueEur > 0."}, {"id": "PLYR-13", "area": "Players", "title": "Shot map shows real shots or explicit empty-state", "priority": "low", "precondition": "Open one player with shots and one with none (or a no-shot-data source).", "steps": ["Open a player known to have shots; confirm the Shot Map renders points and the subtitle '<n> shots · <g> goals'.", "Open a player with zero shots; observe the panel."], "expected": "With shots, the map renders and the subtitle counts match the shots/goals. With no shots, the panel shows 'No shots recorded yet.' rather than an empty/broken chart. On a hasShotData=false source, players show the empty-state.", "guards": "shots.length > 0 gate."}, {"id": "PLYR-14", "area": "Players", "title": "Unknown player id returns notFound", "priority": "low", "precondition": "App running.", "steps": ["Navigate to /players/nonexistent-id.", "Observe response."], "expected": "notFound() 404 renders, no 500.", "guards": "playerDetail returns undefined → notFound()."}, {"id": "CMP-01", "area": "Compare", "title": "Compare two players side by side with default metrics and best-value highlighting", "priority": "high", "precondition": "On /compare in players mode.", "steps": ["Search and add player A, then player B (2 players selected).", "Read the comparison rows for default metrics (goals, assists, xG, xA, key passes, form).", "Confirm each metric's better value is highlighted (teal/bold)."], "expected": "Two columns render with portraits, names linking to /players/[id], and one row per default metric. The higher value per row is highlighted, EXCEPT when both values are equal (no highlight when all tie). xG/xA show 1 decimal; integer metrics show no decimals.", "guards": "isBest excludes the case where every column equals best (vals.filter(==best).length < selected.length)."}, {"id": "CMP-02", "area": "Compare", "title": "Player compare radar plots percentiles for two players", "priority": "medium", "precondition": "Two players selected in players mode.", "steps": ["With 2 players selected, scroll to the 'Percentile profile' radar.", "Confirm two overlaid series (last names) across the RADAR axes."], "expected": "Radar shows seriesA and seriesB keyed to each player's last name; each axis uses percentiles[key] ?? 0. Radar appears only when mode=players and >=2 selected. Missing percentiles default to 0 without breaking the chart.", "guards": "Radar gated on mode==='players' && selected.length>=2."}, {"id": "CMP-03", "area": "Compare", "title": "Compare two teams side by side; lower-is-better metric highlights correctly", "priority": "high", "precondition": "On /compare; switch mode to Teams.", "steps": ["Switch to Teams mode (selection clears).", "Add two teams.", "Read default team metrics (win title, power, offense, defense, ELO).", "Enable the 'FIFA rank' metric and confirm the LOWER FIFA rank is highlighted as best."], "expected": "Team rows render real forecast/power values. Percentage metrics (winTitle etc.) format as %. For 'FIFA rank' (lowerBetter) the smaller number is highlighted. teamVal pulls from forecast first, then powerRanking, then the team object; a team with null forecast/powerRanking yields 0 rather than crashing.", "guards": "lowerBetter → best=Math.min; teamVal falls back gracefully when forecast/powerRanking is null."}, {"id": "CMP-04", "area": "Compare", "title": "Switching mode clears prior selection and swaps metric set", "priority": "medium", "precondition": "Players selected in players mode.", "steps": ["With 2 players selected, click the 'Teams' mode toggle.", "Observe the selection and metric chips."], "expected": "Selection resets to empty (after the first user-driven mode change), the metric set switches to DEFAULT_TEAM, and the pool reloads from /api/teams. Player chips do not linger in team mode.", "guards": "initRef guards the very first mode effect; subsequent mode changes clear selected."}, {"id": "CMP-05", "area": "Compare", "title": "Empty state and selection cap of 4", "priority": "low", "precondition": "On /compare, nothing selected.", "steps": ["Observe the page with no selections.", "Add entities one at a time up to 4.", "Attempt to add a 5th."], "expected": "With 0 selected, the dashed 'Search above to add … and build a comparison card.' empty-state shows. Up to 4 can be added; at 4 the search input is disabled and no 5th is added.", "guards": "add() no-ops when selected.length >= 4; input disabled at 4."}, {"id": "CMP-06", "area": "Compare", "title": "Share link round-trips selection and metrics via URL", "priority": "low", "precondition": "On /compare with >=2 entities selected and a custom metric set.", "steps": ["Toggle a couple of metrics on/off.", "Click 'Share' (appears at >=2 selected) to copy the URL.", "Open the copied URL in a fresh tab once the pool loads."], "expected": "The Share button copies a URL containing mode, ids, and metrics. Opening it restores the same mode, the same selected entities (resolved from ids), and the same metric chips. Ids that no longer exist are silently skipped without error.", "guards": "copyLink writes mode/ids/metrics; init effect resolves ids against pool and filters out missing ones."}, {"id": "CMP-07", "area": "Compare", "title": "Compare degrades on a source lacking advanced metrics", "priority": "medium", "precondition": "Switch to a degraded source (no xG/xA/progressive); /compare in players mode.", "steps": ["Add two players.", "Read xG, xA, prog. passes rows in the comparison and the radar."], "expected": "Advanced metric rows show 0/0.0 inertly (value ?? 0) rather than fabricated figures, and the percentile radar axes for unavailable metrics default to 0 — the comparison does not invent advantages. No NaN or crash.", "guards": "value() uses stats[key] ?? 0; radar uses percentiles[key] ?? 0; on degraded sources those percentiles are absent."}, {"id": "INS-01", "area": "Insights", "title": "Upset cards name the actual winner and a real ELO underdog", "priority": "high", "precondition": "Active edition (e.g. live-2026 or Simulated) has at least one FINISHED match where the lower-ELO side won by >120 ELO points.", "steps": ["Open /insights.", "Find every card with the red 'upset' badge.", "For each, read the title 'Upset: <winner> stun <loser>' and the body score line.", "Cross-check the named winner and score against that match's page (/matches/<id>)."], "expected": "The winner named in the title is the team that actually scored more goals; the score in the body/metrics matches the real result; the ELO-gap metric equals the absolute ELO difference and is >120. Body correctly says 'deserved' when the winner had higher xG, 'smash-and-grab' otherwise. No upset card is shown for a draw or for the favourite winning.", "guards": "If no qualifying upset exists in the active edition, zero upset cards is correct — do not flag absence as a bug."}, {"id": "INS-02", "area": "Insights", "title": "Breakout cards only feature genuinely young outfield players with minutes", "priority": "high", "precondition": "Edition has player stats populated (>=90 minutes for some U23 outfielders).", "steps": ["Open /insights.", "Locate the violet 'breakout' cards.", "Read each player's Age metric and position.", "Verify the body claims (goals, xG, percentile)."], "expected": "Every breakout player is aged 17-23, is NOT a goalkeeper, and has played >=90 minutes. The body's 'At <age>' matches the Age metric. The xG percentile renders as a number+'th' (e.g. '88th') or an em-dash '—' when missing, never 'undefinedth' or 'NaNth'.", "guards": "On feeds without xG percentiles the percentile shows '—' gracefully; that is acceptable, not a bug."}, {"id": "INS-03", "area": "Insights", "title": "Daily Briefing favourite and Golden Boot are internally consistent", "priority": "high", "precondition": "Forecasts have loaded (at least one team has a forecast).", "steps": ["Open /insights.", "Read the Daily Briefing headline, body and bullets.", "Note the favourite team and its Title %.", "Compare the favourite and Title % against /predictions for the same edition."], "expected": "The favourite named is the team with the highest winTitle on /predictions, and the Title % matches. The 'X to win it across 8,000 simulations' figure equals the body's Title %. The Golden Boot bullet names the current scoring leader with proj. >= current goals, or reads 'Golden Boot race wide open' when no scorer exists.", "guards": "Briefing headline is hard-coded '13 June 2026 · Matchday 3' as a subtitle label; that static label is expected and not a data assertion."}, {"id": "INS-04", "area": "Insights", "title": "Briefing degrades safely when forecasts have not loaded", "priority": "medium", "precondition": "Live edition early-load state where no team yet has a forecast (data still streaming).", "steps": ["Switch to World Cup 2026 (live) immediately on a cold start before forecasts populate.", "Open /insights and read the Daily Briefing."], "expected": "Briefing shows the safe fallback: headline 'Tournament data is loading', a body stating how many matches are live, and a single bullet 'N live • M still to play'. No crash, no empty headline, no 'undefined' or '0.0%' favourite.", "guards": "This state is transient; if forecasts are already loaded the normal briefing is correct."}, {"id": "INS-05", "area": "Insights", "title": "Overperformer/form/milestone cards link to the correct entity and are sorted by severity", "priority": "medium", "precondition": "Forecasts and power rankings populated.", "steps": ["Open /insights.", "Click an 'overperformer' card and confirm it lands on /teams/<id>.", "Click a 'breakout' or 'milestone' card and confirm it lands on /players/<id>.", "Observe the order of cards top-to-bottom."], "expected": "Team cards link to /teams, player cards to /players, match cards to /matches; cards with no entity are not links. High-impact (severity high) cards sort first, then medium, then low. Overperformer Δ vs market is shown with a leading '+' and is positive.", "guards": null}, {"id": "INS-06", "area": "Insights", "title": "Tournament switch re-points Insights to the active edition", "priority": "high", "precondition": "App supports switching editions via the top-right selector.", "steps": ["On /insights, note the favourite and any named teams/players.", "Switch the edition to a past men's tournament (e.g. 2018) via the selector.", "Reload/observe /insights."], "expected": "Cards now reference only teams/players from the selected edition (e.g. 2018 squads), not 2026. The favourite and Golden Boot leader correspond to that edition's data. No 2026-only content bleeds through.", "guards": "force-dynamic is set, so content must reflect the active edition on each request."}, {"id": "STORY-01", "area": "Storylines", "title": "Players to Watch never references xG when the feed lacks it", "priority": "high", "precondition": "Switch to a degraded feed (e.g. API-Football live early state or a datahub/historical edition without xG).", "steps": ["Open /storylines on the degraded edition.", "Read each Player story blurb (marksman, creator, breakout, etc.)."], "expected": "Marksman blurbs omit the xG clause entirely when xG<=0 (no 'underpinned by 0 xG' or 'xG of 0'). xG+xA metric still renders as a number. Breakout percentile shows a number+'th' or '—', never 'undefinedth'. No metric is displayed as a bare 0 implying real measured zero.", "guards": "Feeds that DO carry xG should include the finishing clause; presence of xG copy there is correct."}, {"id": "STORY-02", "area": "Storylines", "title": "Empty/early state shows the explainer, not garbled cards", "priority": "high", "precondition": "Live edition with player stats populated for fewer than 3 teams.", "steps": ["Switch to World Cup 2026 (live) at an early matchday before 3 teams have player stats.", "Open /storylines and inspect the 'Players to Watch' panel."], "expected": "When fewer than 3 player storylines exist, the dashed-border explainer renders: 'Player storylines need more matches.' with the correct count ('N team' / 'N teams' pluralized) and the StatsBomb switch hint. Any available player cards still render below the note. No empty grid cells or partial cards.", "guards": "With >=3 player storylines the normal 3-column grid is correct and the explainer must NOT appear."}, {"id": "STORY-03", "area": "Storylines", "title": "Each squad archetype is a distinct team and matches its claim", "priority": "medium", "precondition": "Forecasts and power rankings populated for the active edition.", "steps": ["Open /storylines, scroll to 'Squads to Watch'.", "Read the five archetype cards: Favourites, Surprise Package, Dark Horse, Firepower, The Fortress.", "Verify each archetype's headline metric against /predictions and /rankings."], "expected": "No team appears in two squad cards (one team per archetype). Favourites = highest winTitle. Surprise Package has a positive Δ vs market shown with '+'. The Fortress shows the highest defense rating; Firepower the highest offense rating. Dark Horse is not one of the top-3 title
