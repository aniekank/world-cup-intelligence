teams. All percentages render with one decimal and '%'.", "guards": "If fewer than 5 teams have forecasts, fewer cards is acceptable; no card should show '—' where a real value exists."}, {"id": "STORY-04", "area": "Storylines", "title": "Breakout/in-form player ages and form are factually grounded", "priority": "medium", "precondition": "Edition with form indices and ages populated.", "steps": ["Open /storylines.", "Find any 'Breakout Star' (violet) or 'In Form' (lime) player card.", "Read the age in the breakout blurb and the form index in the in-form blurb."], "expected": "Breakout Star players are aged 17-22 with at least one goal+assist. In Form blurb's form index matches the player's stats.formIndex and player has >=90 minutes. Pluralization is correct ('1 clean sheet' vs '2 clean sheets', '1 assist' vs '2 assists').", "guards": null}, {"id": "STORY-05", "area": "Storylines", "title": "Player and squad cards link to the right pages with portraits/crests", "priority": "low", "precondition": "Any populated edition.", "steps": ["Open /storylines.", "Click a player card; then go back and click a squad card.", "Confirm crests/portraits render."], "expected": "Player cards link to /players/<entityId>; squad cards link to /teams/<entityId>. Squad crest renders only when the team resolves (no broken crest). Portraits load by player id. Metric label 'Boot rank' appears only for players in the Golden Boot list; otherwise 'Form' is shown.", "guards": null}, {"id": "DISC-01", "area": "Discoveries", "title": "Underrated-by-continent degrades to a clear message off the live edition", "priority": "high", "precondition": "Active edition is NOT live-2026 (e.g. a past or simulated edition).", "steps": ["Switch to a past/simulated edition.", "Open /discoveries and read the 'Underrated by Continent' section."], "expected": "Because club affiliations only load for live-2026, byContinent is empty and the EmptyState reads 'Underrated profiles use live club data. Switch to World Cup 2026 in the top-right selector.' No empty grid, no players with missing club logos.", "guards": "On live-2026 with club data loaded, real player cards must appear instead; the live EmptyState 'Club links are still loading' is only correct during the brief loading window."}, {"id": "DISC-02", "area": "Discoveries", "title": "Underrated players are top-club players of non-favourite nations", "priority": "high", "precondition": "Active edition is live-2026 with club map fully loaded.", "steps": ["On live-2026, open /discoveries.", "Inspect several Underrated cards across continents.", "Read each card's club, league chip, nation, and 'Nation title odds'."], "expected": "Every player plays at a top-5-league or marquee club (tier>=2). Each player's nation has title odds <=6% (favourites excluded). 'Nation title odds' shows a percentage to one decimal matching that nation's winTitle. Each continent group shows at most 3 players, one per nation. Confederation labels are full-form (e.g. 'Europe (UEFA)').", "guards": "Continents with no qualifying player are omitted entirely; an absent confederation group is not a bug."}, {"id": "DISC-03", "area": "Discoveries", "title": "First-Timers list only true debut nations for the active edition's year", "priority": "high", "precondition": "Active edition has known debutant nations for its year (or none).", "steps": ["Open /discoveries, scroll to 'First-Timers · debut nations'.", "Note which nations appear and the active edition's year.", "Switch to a different edition (different year) and re-check."], "expected": "Listed nations match the debutant set for the active tournament's year only; switching years changes the list accordingly. Each debut card shows squad size, confederation, group (if any), coach (only when a real manager exists, not '—'), and a 'Debut' badge. When the year has no debutants, EmptyState 'No debutant nations recorded for this tournament.' shows instead of an empty grid.", "guards": "Debutant data is keyed off tournament.year; a year with zero recorded debutants legitimately yields the empty state."}, {"id": "DISC-04", "area": "Discoveries", "title": "Debut 'Players at European clubs' chips only show when club links exist", "priority": "medium", "precondition": "Active edition is live-2026 with club map loaded and at least one debutant nation.", "steps": ["On live-2026, open /discoveries debut cards.", "Check the 'Players at European clubs' chip row on each debut card."], "expected": "The chip row appears only when keyPlayers is non-empty; each chip shows player name + club and links to /players/<id> (max 6). The blurb's 'leans on European-based talent like <name> (<club>)' names the first key player. When no key players, the blurb falls back to 'A historic debut on the game's biggest stage.' and no chip row renders.", "guards": "Off live editions club links are unavailable, so chips legitimately do not render."}, {"id": "DISC-05", "area": "Discoveries", "title": "Debut card crest and team links resolve", "priority": "low", "precondition": "At least one debutant nation in the active edition.", "steps": ["Open /discoveries.", "Click a debut nation's name/flag heading."], "expected": "Heading links to /teams/<id>; the TeamCrest renders only when the team resolves in the store (no broken crest box). Squad size matches the team's squad length on its team page.", "guards": null}, {"id": "HIST-01", "area": "History", "title": "Each edition card shows the correct champion, Golden Boot and tallies", "priority": "high", "precondition": "StatsBomb tournament snapshots are loadable.", "steps": ["Open /history.", "For each men's and women's card, read champion (+flag), matches, goals, G/Game, xG/Shot, and Golden Boot.", "Spot-check goals and matches against a known reference for that World Cup."], "expected": "Champion and flag match the registry for that edition. G/Game equals goals/matches to 2 decimals; xG/Shot is the per-shot average to 2 decimals (a plausible 0.08-0.15 range, never 0 for a StatsBomb edition). Golden Boot names the snapshot's top scorer with its goal count. Women's cards are grouped under 'Women's World Cups', men's under 'Men's World Cups'.", "guards": "Only tournaments with source='statsbomb' appear here (currently four: 2018, 2022, W2019, W2023); the live 2026 edition is intentionally excluded."}, {"id": "HIST-02", "area": "History", "title": "Summary header aggregates and span are computed across all editions", "priority": "medium", "precondition": "At least one StatsBomb edition loads.", "steps": ["Open /history.", "Read the four header Stats: Tournaments analyzed, Matches, Goals (with '/ game'), Span.", "Sum the per-card matches and goals and compare."], "expected": "'Tournaments analyzed' equals the number of edition cards. Header Matches/Goals equal the sums of the per-card values. The '/ game' figure equals totalGoals/totalMatches to 2 decimals. Span shows min year–max year across the loaded editions.", "guards": "If one snapshot fails to load it is silently skipped (try/catch); header counts then reflect only successfully loaded editions, which is acceptable."}, {"id": "HIST-03", "area": "History", "title": "Goals-per-game and xG-per-shot bar charts match the cards and are color-coded by gender", "priority": "medium", "precondition": "History page loaded with >=2 editions.", "steps": ["Open /history.", "Compare each bar in 'Goals per Game' and 'Shot Quality (xG per shot)' to the matching edition card's G/Game and xG/Shot.", "Check bar colors."], "expected": "Each bar's value matches its card to 2 decimals. Women's editions render in pink (#ff2e9a), men's in teal. No xG/shot bar is 0 for a StatsBomb edition. Bar labels use the short edition name.", "guards": null}, {"id": "HIST-04", "area": "History", "title": "Explore button switches the active edition and re-points the app", "priority": "high", "precondition": "History page loaded.", "steps": ["On /history, click 'Explore <short>' on a specific edition (e.g. 2018).", "Navigate to /insights, /analytics, and /groups."], "expected": "After exploring, the whole app re-points to that edition: standings, players, analytics and insights all reflect the chosen year, not 2026. The selector in the top-right reflects the same active edition.", "guards": "This is the cross-page consistency check that ties History switching to the rest of the app."}, {"id": "HIST-05", "area": "History", "title": "History never shows metrics as 0 or garbled for an unfinished/empty snapshot", "priority": "medium", "precondition": "Hypothetical edition with zero matches loaded (guard against divide-by-zero).", "steps": ["Inspect a snapshot whose matches array is empty (or force one).", "Observe its card and the header aggregates."], "expected": "goalsPerGame and conversion fall back to 0 via the matches-length guard rather than producing NaN/Infinity. avgGpg uses totalMatches guard. No 'NaN', 'Infinity', or blank values render. (An all-zero edition card would be a data smell to escalate, but must not crash the page.)", "guards": "In normal operation every StatsBomb edition has matches; this guards the divide-by-zero edge only."}, {"id": "ANL-01", "area": "Analytics", "title": "Header aggregates derive from real shot data of the active edition", "priority": "high", "precondition": "Active edition has shot-level data (StatsBomb or live with xG).", "steps": ["Open /analytics.", "Read Avg xG/shot (+shot count), Conversion, Big chances, Set-piece xG %.", "Sanity-check against the active edition's match shot data."], "expected": "Avg xG/shot = totalXG/totalShots to 2 decimals with the real shot count in 'N shots'. Conversion = goals/shots % (counts goal and penalty_goal). Set-piece xG % is the share of total xG from corner/set_piece/free_kick/direct_free_kick. With zero shots all four guard to 0/0.0% rather than NaN.", "guards": "On a degraded feed lacking shots these may legitimately be 0; flag only if the edition clearly has shot data but shows 0."}, {"id": "ANL-02", "area": "Analytics", "title": "Finishing and creativity scatters reflect filtered eligible players", "priority": "medium", "precondition": "Active edition has player stats.", "steps": ["Open /analytics.", "Hover/inspect points in the 'Finishing' (xG vs Goals) and 'Creativity' (xA vs Assists) scatters.", "Confirm which players are plotted."], "expected": "Finishing plots only outfield players (no GK) with >=90 minutes and (xG>0.5 or goals>0); points above the y=x line are overperforming xG as the subtitle claims. Creativity plots players with >=90 minutes and (xA>0.4 or assists>0). Bubble size encodes shots (finishing) / key passes (creativity). No more than 120 points each.", "guards": "Empty scatters are acceptable on a feed with no advanced player metrics; cards should still render axes without crashing."}, {"id": "ANL-03", "area": "Analytics", "title": "Leader bars show top-10 by the labelled metric with team colors", "priority": "medium", "precondition": "Player stats populated.", "steps": ["Open /analytics.", "Read xG Leaders, Progressive Passers, Top Tacklers, Pressing Volume bars.", "Compare ordering to the players list sorted by each metric."], "expected": "Each bar list is the top 10 sorted descending by its metric; labels are '<TEAM> <Surname>'; bar color is the player's team primary color. Values are rounded to 1 decimal. A missing metric defaults to 0 rather than undefined.", "guards": "On feeds without progressive/pressing data those panels may show 0-valued bars; that is graceful degradation, not a crash."}, {"id": "GUIDE-01", "area": "Guide", "title": "Every metric the app displays has a glossary entry", "priority": "high", "precondition": "None.", "steps": ["Open /guide and read the glossary.", "List the metrics shown elsewhere: xG, xA, shot map, ELO, power rating, form, Monte Carlo, Title %, stage-reach %, group-win/advance %, Δ pre-WC vs now, Golden Boot projection, implied probability, vig/de-vig, edge/EV, Kelly.", "Confirm each has a definition."], "expected": "All listed metrics appear as glossary terms with plain-language definitions. xG is explained with a concrete example (0.7 vs 0.03). xA, ELO ranges, Monte Carlo (8,000 runs), and Golden Boot projection (folds in xG) are present and accurate. No metric used on Analytics/Predictions/Betting is left undefined.", "guards": "If the app later surfaces a new metric (e.g. field tilt, possession) not in the glossary, flag it as a coverage gap."}, {"id": "GUIDE-02", "area": "Guide", "title": "Glossary deep-link anchors and internal links work", "priority": "medium", "precondition": "None.", "steps": ["Open /guide.", "Navigate to /guide#xg, #xa, #elo, #power, #monte-carlo, #title, #stage-reach, #golden-boot, #vig, #edge-ev, #kelly.", "Click the in-body links: 'Rankings' (#power), 'Ask' (footer), and tour cards."], "expected": "Each anchor scrolls to the matching term (scroll-mt-24 offset keeps it below the header). 'Rankings' link goes to /rankings, 'Ask' to /ask. Every tour card links to its stated route (/globe, /live, /groups, /predictions, /bracket, /betting, /clubs, /discoveries, /history). No broken anchors or 404s.", "guards": null}, {"id": "GUIDE-03", "area": "Guide", "title": "Guide accurately describes tournament switching and live-vs-simulated", "priority": "low", "precondition": "None.", "steps": ["Open /guide and read Quick Start and the 'Simulated 2026' deep-dive.", "Cross-check claims against actual selector behaviour."], "expected": "Quick Start correctly states the top-right selector switches the whole app (live 2026, past editions, Simulated 2026 sandbox). The Simulated section correctly frames it as deterministic/offline and not for real predictions. Descriptions match the editions actually offered in the selector.", "guards": "If the selector's available editions diverge from the guide's list, flag the doc drift."}, {"id": "BET-01", "area": "Betting Edge", "title": "Empty state on a non-live tournament", "priority": "high", "precondition": "App is running. Use the top-right tournament selector to switch to ANY historical/non-live edition (e.g. a datahub edition or a precomputed past World Cup), NOT live-2026.", "steps": ["Switch the active tournament to a non-live edition.", "Navigate to /betting.", "Read the body content below the page header and banners."], "expected": "The page renders the EmptyState with the exact copy 'Betting markets are only available for the live World Cup 2026. Switch to it in the top-right selector.' No table, no slip, no Kelly card. The ResponsibleGamblingBanner and SimulationBanner still render above it.", "guards": "This branch fires because getActiveTournamentId() !== 'live-2026' so data.isLive is false and getMarketEvents() is never called. Confirm no network call to the odds provider was made."}, {"id": "BET-02", "area": "Betting Edge", "title": "Empty state on live but no priced fixtures", "priority": "high", "precondition": "Active tournament is live-2026. An odds source IS configured (ODDS_API_KEY or API_FOOTBALL_KEY) and returns events, but NONE of those events join to an upcoming (non-FINISHED) fixture — e.g. all priced events correspond to finished matches, or the team-pair join misses entirely.", "steps": ["Ensure live-2026 is active and the odds source returns at least one event but zero join to current fixtures.", "Navigate to /betting.", "Read the EmptyState copy."], "expected": "EmptyState shows exactly 'No upcoming fixtures are priced by the market right now — check back closer to kickoff.' This is the data.hasMarket === true but rows.length === 0 branch.", "guards": "hasMarket is true when events.length > 0. available is false when rows.length === 0. Distinguish carefully from BET-03 (no source at all)."}, {"id": "BET-03", "area": "Betting Edge", "title": "Empty state on live with no odds source (must resolve, not spin)", "priority": "high", "precondition": "Active tournament is live-2026. NO odds source configured (neither ODDS_API_KEY nor API_FOOTBALL_KEY set), OR both providers return an empty array.", "steps": ["Unset both ODDS_API_KEY and API_FOOTBALL_KEY (or force both providers to return []).", "Navigate to /betting.", "Wait for the page to settle and observe the body."], "expected": "EmptyState shows exactly 'Live betting markets are currently unavailable.' The page fully resolves to this static message — it must NOT show a perpetual spinner or 'Loading…' that never resolves. hasMarket is false (events.length === 0) and available is false.", "guards": "getMarketEvents returns [] when no key. This is the !data.hasMarket branch. Regression guard: confirm there is no infinite loading state since the page is a server component returning final HTML."}, {"id": "BET-04", "area": "Betting Edge", "title": "Happy path — model vs market table renders all priced upcoming fixtures", "priority": "high", "precondition": "live-2026 active; odds source returns priced events that join to multiple upcoming fixtures.", "steps": ["Navigate to /betting.", "Inspect the 'Model vs Market — All Fixtures' table.", "Cross-check the fixtures shown against the live fixture list and the source's priced events (and server log line '[oddsApi] N priced events' or '[oddsApiFootball] N priced WC fixtures')."], "expected": "Every upcoming (non-FINISHED) fixture that a bookmaker prices appears as a 3-row group (Home win / Draw / Away win). Each group shows the fixture label only on its first row. Columns: Fixture, Pick, Model, Market, Best, EV. Finished matches are absent.", "guards": "betting.ts skips m.status === 'FINISHED' and skips fixtures with no matching priced event (no first cand). A priced event that matches no fixture is logged via '[betting] unmatched market events:' — verify that warning lists only genuinely-absent fixtures, not name-spelling misses."}, {"id": "BET-05", "area": "Betting Edge", "title": "De-vigged market probabilities sum to ~1 per fixture", "priority": "high", "precondition": "live-2026 active with priced fixtures.", "steps": ["On /betting, pick any fixture row group in the All Fixtures table.", "Read the Market column for Home, Draw, Away.", "Sum the three Market percentages."], "expected": "The three Market probabilities sum to approximately 100% (within rounding, ~99.9–100.1%). They are de-vigged: each book's raw implied probs (1/odds) are normalized to sum to 1, then averaged across books — so the bookmaker overround/vig is removed.", "guards": "devig() in oddsApi.ts / oddsApiFootball.ts normalizes per book before averaging. Raw odds-implied probs would sum to >100% (the vig); de-vigged must sum to ~100%."}, {"id": "BET-06", "area": "Betting Edge", "title": "Best odds are the maximum decimal price across books", "priority": "medium", "precondition": "live-2026 active; a fixture is priced by multiple books with differing prices.", "steps": ["Identify a fixture priced by >1 book and note each book's decimal prices for one outcome (from raw provider data or logs).", "On /betting, read the Best column for that outcome."], "expected": "The Best price equals the maximum decimal price offered by any book for that outcome (best.home/draw/away = Math.max across books), formatted to 2 decimals. It is never an average and never lower than any individual book's price.", "guards": "best.* uses Math.max in both devig implementations. books count shown elsewhere should be >= the number of books that contributed."}, {"id": "BET-07", "area": "Betting Edge", "title": "Edge column equals model minus market", "priority": "high", "precondition": "live-2026 active with priced fixtures.", "steps": ["On any outcome row, note Model% and Market%.", "Compute Model − Market.", "Compare to the edge value (note: the table surfaces EV, not edge directly — verify via the value-bet card 'model X vs mkt Y' and the underlying edge field)."], "expected": "edge = model − market for each outcome (EdgeOutcome.edge). A positive edge means the model assigns more probability than the de-vigged market. The value-bet card shows 'model {pct} vs mkt {pct}' consistent with this.", "guards": "betting.ts mk(): edge: model - mkt. Confirm sign correctness (model higher → positive)."}, {"id": "BET-08", "area": "Betting Edge", "title": "EV column equals model*odds − 1", "priority": "high", "precondition": "live-2026 active with priced fixtures.", "steps": ["Pick an outcome row; note Model (as a fraction) and Best odds.", "Compute model * odds − 1.", "Compare to the displayed EV (shown as a percentage)."], "expected": "EV displayed = (model * bestOdds − 1) shown as a signed percentage to 1 decimal. Example: model 0.40, odds 2.80 → 0.40*2.80−1 = +0.12 → '+12.0%'. EV uses BEST odds (not market consensus odds).", "guards": "mk(): ev = price > 0 ? model*price - 1 : -1. If price is 0/invalid, ev is forced to -1 (never NaN). Verify no NaN/Infinity appears anywhere."}, {"id": "BET-09", "area": "Betting Edge", "title": "EV color coding thresholds", "priority": "medium", "precondition": "live-2026 active with a spread of EV values (some >0.02, some between, some <-0.05).", "steps": ["Scan the EV column and the value-bet card EV figures.", "Note text color for outcomes with EV > +2%, between −5% and +2%, and < −5%."], "expected": "EV > 0.02 renders in accent (positive/teal); EV < −0.05 renders in accent-red; everything in between renders muted. evColor() drives this in BettingClient.", "guards": "evColor = ev>0.02 ? accent : ev<-0.05 ? accent-red : muted. Boundary: exactly 0.02 is NOT accent (strict >), exactly -0.05 is NOT red (strict <)."}, {"id": "BET-10", "area": "Betting Edge", "title": "Value-bet flagging uses bestEv > 0.02 and the card appears only when value bets exist", "priority": "high", "precondition": "live-2026 active.", "steps": ["Case A: at least one fixture has bestEv > 0.02. Navigate to /betting.", "Case B: no fixture has bestEv > 0.02. Navigate to /betting."], "expected": "Case A: the 'Model Disagrees With the Market' card renders, listing fixtures whose bestEv > 0.02 (max 8). Case B: that card is entirely absent (valueBets.length === 0 → not rendered). The All-Fixtures table still renders in both cases.", "guards": "Client filters rows.filter(r => r.bestEv > 0.02).slice(0,8). Server valueBets uses the same > 0.02 threshold. A fixture with bestEv exactly 0.02 is NOT flagged."}, {"id": "BET-11", "area": "Betting Edge", "title": "Value-bet card caps at 8 entries", "priority": "low", "precondition": "live-2026 active with MORE than 8 fixtures having bestEv > 0.02.", "steps": ["Navigate to /betting.", "Count the rows in the 'Model Disagrees With the Market' card."], "expected": "At most 8 fixtures are listed in the value-bet card (slice(0,8)), and they are the highest-bestEv ones since rows are pre-sorted descending by bestEv on the server.", "guards": "Server rows.sort((a,b)=>b.bestEv-a.bestEv). Client slice(0,8)."}, {"id": "BET-12", "area": "Betting Edge", "title": "Rows sorted by bestEv descending", "priority": "medium", "precondition": "live-2026 active with several priced fixtures of varying bestEv.", "steps": ["On /betting read the bestEv-equivalent (top EV of each fixture group) down the All Fixtures table and the value-bet card order.", "Confirm ordering."], "expected": "Fixture groups are ordered so the fixture with the highest single-outcome EV (bestEv) appears first, descending. The value-bet card follows the same order.", "guards": "betting.ts rows.sort by b.bestEv - a.bestEv before return. bestEv = Math.max of the three outcome EVs."}, {"id": "BET-13", "area": "Betting Edge", "title": "Home/away orientation matches OUR fixture even when the book lists it reversed", "priority": "high", "precondition": "live-2026 active; at least one priced event where the bookmaker's home_team is OUR away team (pairing reversed relative to our fixture).", "steps": ["Identify a fixture where our home team is the book's away_team (compare provider raw names to the fixture).", "On /betting find that fixture's row group.", "Verify the 'Home win' Pick row corresponds to OUR home team and uses the market/best for our home side."], "expected": "Outcomes are oriented to OUR fixture: when e.home !== normTeam(ourHome), the market and best objects are swapped (home↔away, draw unchanged). So the 'X win' Pick label, its Model, Market and Best all describe OUR home team — never the book's listing order.", "guards": "betting.ts: direct = e.home === hk; if not direct, market/best home and away are swapped. Bug-class: reversed orientation would pair our home win prob against the away team's price — check a known asymmetric matchup."}, {"id": "BET-14", "area": "Betting Edge", "title": "Divergent team-name spellings still match (alias map)", "priority": "high", "precondition": "live-2026 active; priced events include nations the two sources spell differently — e.g. USA / United States, Congo DR / DR Congo, Türkiye / Turkey, Czechia / Czech Republic, Korea Republic / South Korea, Côte d'Ivoire / Ivory Coast.", "steps": ["Confirm such fixtures exist in the live fixtures AND are priced by the source.", "Navigate to /betting and verify each such fixture appears in the table.", "Check the server console for '[betting] unmatched market events:'."], "expected": "Every divergent-spelling fixture that the source prices appears in the table (the alias map in oddsApi.ts reconciles the names through normTeam). The '[betting] unmatched market events:' warning does NOT list any of these reconciled nations.", "guards": "normTeam strips accents, lowercases, strips 'fa'/'national team', then applies ALIAS. e.g. 'türkiye'→'turkey', 'congo dr'→'dr congo', 'usa'→'united states', 'korea republic'→'south korea', 'czechia'→'czech republic'. Any such name in the unmatched log is a regression."}, {"id": "BET-15", "area": "Betting Edge", "title": "Same-pair rematch disambiguated by nearest kickoff", "priority": "medium", "precondition": "live-2026 active; the same team pair is priced for two events (e.g. a knockout rematch) so byPair has >1 candidate.", "steps": ["Identify a team pair with two priced events at different commence times.", "On /betting confirm the fixture's odds correspond to the event whose commence time is nearest the fixture's kickoff."], "expected": "When a pair has multiple priced events, betting.ts picks the candidate whose commence time is closest to our fixture kickoff (min |commence − kickoff|). The displayed prices match that nearest event, not an arbitrary first.", "guards": "betting.ts loops cands and replaces e when Math.abs(commence-kickoff) is smaller. Only applies when cands.length>1 and kickoffMs is finite."}, {"id": "BET-16", "area": "Betting Edge", "title": "Source selection — API-Football primary, The Odds API fallback, identical shape", "priority": "high", "precondition": "live-2026 active. Run twice: (A) API_FOOTBALL_KEY set; (B) API_FOOTBALL_KEY unset but ODDS_API_KEY set.", "steps": ["Run A: with API_FOOTBALL_KEY configured and returning events, load /betting.", "Run B: unset API_FOOTBALL_KEY, keep ODDS_API_KEY, load /betting.", "Compare the table structure and that fixtures populate in both."], "expected": "Both runs render the same table shape (3 outcomes/fixture, same columns, de-vigged market, best odds, EV) because both providers emit the identical MarketEvent[] shape. In A the log shows '[oddsApiFootball] …'; in B it shows '[oddsApi] …'. If API-Football returns empty/throws, it falls back to The Odds API.", "guards": "getMarketEvents prefers fetchApiFootballMarket() when API_FOOTBALL_KEY set and result non-empty; on empty/exception it logs '[market] API-Football odds unavailable, falling back…' and uses ODDS_API_KEY. Finished matches excluded by betting.ts regardless of source."}, {"id": "BET-17", "area": "Betting Edge", "title": "Math sanity — no NaN/Infinity, EV/edge plausible, value bets truly >2%", "priority": "high", "precondition": "live-2026 active with priced fixtures.", "steps": ["Scan every Model, Market, Best, EV cell in the table and the value-bet card.", "Confirm no cell shows NaN, Infinity, undefined, or a wildly implausible value (e.g. EV +900%).", "For each fixture in the value-bet card, confirm its top EV is strictly greater than 2.0%."], "expected": "All numeric cells are finite and plausible (model/market in 0–100%, odds >= ~1.01, EV within a sane range). Every value-bet-card fixture has bestEv > 0.02 (i.e. its shown top EV > +2.0%). No NaN anywhere.", "guards": "ev guarded by price>0 ? … : -1. devig skips price<=1 and non-finite. If a model prob were undefined it'd surface as NaN% — treat that as a bug (e.g. missing prediction)."}, {"id": "BET-18", "area": "Betting Edge", "title": "Add to slip from table and from value-bet card; dedupe by match+side", "priority": "high", "precondition": "live-2026 active with at least one priced fixture; betting client loaded.", "steps": ["Click the + button on an outcome row in the All Fixtures table.", "Observe the slip on the right ('Your Slip').", "Click + for the SAME fixture+side again (from card or table).", "Click + for a different outcome of the same fixture."], "expected": "First click adds a selection showing the outcome label, 'HOME v AWAY' match label, and the best odds to 2 decimals. Re-adding the same match+side does NOT create a duplicate (keyed by `${matchId}-${side}`). A different side of the same fixture adds a separate line.", "guards": "add() builds key matchId-side and skips if prev.find(key) exists. The value-bet card's + adds the single best outcome (r.outcomes reduce by max ev)."}, {"id": "BET-19", "area": "Betting Edge", "title": "Slip persists across reload via localStorage wc26:betslip", "priority": "medium", "precondition": "Betting client loaded with at least one selection in the slip.", "steps": ["Add 2 selections, set a stake, switch mode to Accumulator.", "Reload /betting.", "Inspect localStorage key 'wc26:betslip' and the rendered slip."], "expected": "After reload the slip, stake, and mode are restored from localStorage. localStorage['wc26:betslip'] holds JSON {slip:[…], stake, mode}. The persist effect only writes after hydration (hydrated flag) so it never clobbers stored state with the initial defaults on first paint.", "guards": "Read effect parses SLIP_KEY on mount; write effect gated by hydrated. Clearing the slip ([]) should also persist as empty."}, {"id": "BET-20", "area": "Betting Edge", "title": "Singles mode slip math", "priority": "high", "precondition": "Slip has N selections (N>=2), mode = Singles, stake = S per selection.", "steps": ["Set mode to 'Singles'.", "Set stake to a known value S (e.g. 10) with 2 selections of odds o1, o2 and model probs p1, p2.", "Read Total stake, Return if all win, Model expected value."], "expected": "Total stake = S * N. 'Return if all win' = sum over selections of S*odds. Model expected value = sum of (model*odds − 1)*S per selection. Values formatted to 2 decimals; EV sign-prefixed and tone-colored (green positive / red negative). No 'Combined odds' row in singles mode.", "guards": "slipMath singles branch: totalStake = stake*slip.length; ret = Σ stake*odds; ev = Σ (model*odds-1)*stake. combOdds row only shown in acca."}, {"id": "BET-21", "area": "Betting Edge", "title": "Accumulator mode slip math", "priority": "high", "precondition": "Slip has N selections, mode = Accumulator, stake = S.", "steps": ["Switch mode to 'Accumulator'.", "With odds o1..oN and model probs p1..pN, read Combined odds, Total stake, Potential return, Model expected value."], "expected": "Combined odds = product of all selection odds. Total stake = S (single stake, NOT multiplied by count). Potential return = S * combinedOdds. Model EV = (productOfModelProbs * combinedOdds − 1) * S. 'Combined odds' row is shown in acca mode.", "guards": "acca branch: combOdds = Π odds; combModel = Π model; ret = stake*combOdds; ev = (combModel*combOdds-1)*stake; totalStake = stake (not *length)."}, {"id": "BET-22", "area": "Betting Edge", "title": "Empty slip and stake input guards", "priority": "medium", "precondition": "Betting client loaded.", "steps": ["With an empty slip, read the slip panel.", "Add a selection, then type a negative number into the stake input.", "Clear the slip via the Clear button."], "expected": "Empty slip shows 'Add selections from the table to build a slip. Saved on this device.' and no mode toggle/math. Stake input clamps to >= 0 (Math.max(0, …)); negative entry becomes 0. Clear button (only visible when slip non-empty) empties the slip and the empty-state copy returns.", "guards": "onChange stake uses Math.max(0, Number(...)). slipMath returns null for empty slip. Clear sets slip([])."}, {"id": "BET-23", "area": "Betting Edge", "title": "Kelly calculator — stake never exceeds 100% or goes negative", "priority": "high", "precondition": "Betting client loaded; Kelly card visible.", "steps": ["Set Decimal odds, Your win probability%, Bankroll.", "Case A: enter a positive-edge input (e.g. odds 2.5, prob 60%).", "Case B: enter a no-edge/negative input (e.g. odds 2.5, prob 30%).", "Sweep the Kelly fraction slider 5%–100%."], "expected": "Full Kelly = (b*p − (1−p))/b with b = odds−1, clamped at 0 (never negative). Suggested stake = max(0,fullKelly)*fraction*bankroll — never negative, never more than 100% of bankroll (fraction<=1 and clamped fullKelly<=… for sane inputs). Case B: fullKelly<=0 → Full Kelly 0.0%, suggested stake 0.00, and the amber note 'No edge at these inputs — Kelly says stake nothing.' appears. Edge(EV) row = p*odds−1 with green/red tone.", "guards": "fullKelly = b>0 ? (b*p-(1-p))/b : 0; k = Math.max(0,fullKelly)*fraction; stake = k*bankroll. Negative-edge must never suggest a positive stake. Verify suggested stake <= bankroll for any fraction<=1."}, {"id": "BET-24", "area": "Betting Edge", "title": "Responsible-gambling banner always present and not dismissible", "priority": "high", "precondition": "Any state of /betting (empty or populated).", "steps": ["Load /betting in each empty state (BET-01/02/03) and in the populated state.", "Look for the amber ShieldAlert banner above the content.", "Attempt to find any dismiss/collapse control."], "expected": "The ResponsibleGamblingBanner renders in ALL states, above the EmptyState/BettingClient. It states 'For analysis & education only — not betting advice.', explains positive edge usually means the model is wrong, mentions legal age and staking only what you can afford, and lists support resources (BeGambleAware.org, GamCare, 1-800-GAMBLER). There is NO dismiss or collapse control.", "guards": "Banner is rendered unconditionally in page.tsx before the available check. Component has no state/close handler."}, {"id": "BET-25", "area": "Betting Edge", "title": "Books count displayed and consistent", "priority": "low", "precondition": "live-2026 active with priced fixtures.", "steps": ["On the value-bet card, read the 'N books' subtitle for a fixture.", "Compare N to the number of books that priced that event."], "expected": "The 'N books' figure equals EdgeRow.books = the count of books that contributed a complete 1X2 (h2h) price for that event (probs.length in devig). It is >= 1 for any priced fixture.", "guards": "books = probs.length; only books with all three valid prices (h&&d&&a) are counted."}, {"id": "SET-01", "area": "Settings", "title": "Settings load defaults then persist changes to wc26:prefs", "priority": "high", "precondition": "App running; /settings reachable.", "steps": ["With no stored prefs, open /settings and note defaults.", "Change Odds format to Decimal, Density to Compact, Timezone to Local.", "Toggle 'AI insight digests' on.", "Inspect localStorage 'wc26:prefs' after each change."], "expected": "Defaults: Odds format Percentage, Density Comfortable, Timezone UTC, notifications goals/kickoff/upsets ON and insights OFF. Each change writes the full prefs object to localStorage['wc26:prefs'] immediately and shows a transient 'Preferences saved.' message (~1.5s). Selected option/toggle reflects the new value.", "guards": "update() does setState + localStorage.setItem + setSaved(true) with a 1500ms reset. Stored prefs are merged over DEFAULT on load ({...DEFAULT, ...JSON.parse})."}, {"id": "SET-02", "area": "Settings", "title": "Settings persist across reload and tolerate corrupt/partial storage", "priority": "medium", "precondition": "/settings reachable.", "steps": ["Set non-default prefs, then reload /settings — confirm selections restored.", "Manually set localStorage['wc26:prefs'] to invalid JSON (e.g. 'not-json') and reload.", "Manually set it to a partial object (e.g. {\"oddsFormat\":\"american\"}) and reload."], "expected": "Reload restores all saved selections. Invalid JSON is swallowed (try/catch) and the UI falls back to DEFAULT without crashing. A partial stored object is merged over DEFAULT, so missing keys (e.g. notifications) keep their default values rather than becoming undefined.", "guards": "Load effect wraps JSON.parse in try/catch; merge is {...DEFAULT, ...stored}. Note nested notifications partial would shallow-merge — verify no crash if notifications absent."}, {"id": "SET-03", "area": "Settings", "title": "About panel shows competition metadata", "priority": "low", "precondition": "/settings reachable; a competition is active.", "steps": ["Open /settings and read the About panel."], "expected": "About panel lists Platform 'WC26 Intelligence v1.0', Competition as '{name} ({season})' from getCompetition(), Hosts as the joined hostCountries, Data source 'Deterministic simulation engine', Simulations '8,000 Monte Carlo runs', and Analytics 'ELO · bivariate-Poisson · xG · power ratings'. Competition/Hosts reflect the active tournament.", "guards": "page is force-dynamic and reads getCompetition() server-side; values should track the active edition."}, {"id": "FAV-01", "area": "Favorites", "title": "Favorites empty state and team list load", "priority": "high", "precondition": "No favorites stored; /favorites reachable; /api/teams returns teams.", "steps": ["Clear localStorage['wc26:favorites'].", "Open /favorites and wait for load.", "Read the 'Your Favorites' section and the 'Follow teams' list."], "expected": "While loading, 'Your Favorites' shows 'Loading…'. After load with no favorites it shows 'No favorites yet. Tap a star below to follow a team.' The 'Follow teams' grid lists every team from /api/teams with flag, name, and an unfilled star.", "guards": "ready flag flips in finally(); favTeams = teams filtered by favorites. Empty favorites array yields the empty copy, not Loading."}, {"id": "FAV-02", "area": "Favorites", "title": "Toggle favorite persists to wc26:favorites and survives reload", "priority": "high", "precondition": "/favorites loaded.", "steps": ["Click the star next to a team in 'Follow teams'.", "Confirm it appears in 'Your Favorites' with title odds.", "Inspect localStorage['wc26:favorites'].", "Reload /favorites.", "Click the same star again to unfavorite."], "expected": "Toggling adds the team id to favorites, fills its star (accent-amber), and surfaces a card in 'Your Favorites' linking to /teams/{id} with 'Title odds {winTitle*100}%'. localStorage['wc26:favorites'] is a JSON array of ids. After reload favorites are restored. Toggling again removes the id and the card.", "guards": "toggle() adds/removes id and writes JSON.stringify(next) to KEY before returning the new state. winTitle defaults to 0 → '0.0%' if forecast is null."}, {"id": "FAV-03", "area": "Favorites", "title": "Favorites resilient to corrupt storage and missing forecast", "priority": "medium", "precondition": "/favorites reachable.", "steps": ["Set localStorage['wc26:favorites'] to invalid JSON and reload /favorites.", "Favorite a team whose forecast is null (e.g. a non-qualified or live team with no forecast)."], "expected": "Invalid JSON is caught and favorites fall back to [] without crashing. A favorited team with forecast === null renders 'Title odds 0.0%' (winTitle ?? 0) rather than NaN or a crash.", "guards": "Load effect try/catch sets favorites([]) on parse error. Title odds uses (t.forecast?.winTitle ?? 0)."}, {"id": "SRCH-01", "area": "Search", "title": "Surname-only query returns the correct player as the top result", "priority": "high", "precondition": "App running on an edition whose roster contains a player whose surname is 'Messi' (e.g. live-2026 / simulation). Note the active edition.", "steps": ["Click the Topbar search box.", "Type 'messi' (lowercase, no first name).", "Wait for the dropdown to populate (debounced ~160ms) and inspect the Players group."], "expected": "The dropdown shows a Players group whose FIRST entry is the Messi on the active roster (name contains the 'Messi' surname token, with that team's flag/code beside it). No 500/error; the list is not empty when Messi exists in the edition.", "guards": "Assert on the player NAME text, not merely that results exist. If Messi is not in the active edition, this case is N/A — switch to an edition that has him first."}, {"id": "SRCH-02", "area": "Search", "title": "Full name 'lionel messi' ranks the exact player first", "priority": "high", "precondition": "Active edition roster contains Lionel Messi.", "steps": ["Type 'lionel messi' into the search box.", "Inspect the top Players result."], "expected": "Exact player (Lionel / L. Messi) is the #1 player result. Both signal tokens ('lionel' and 'messi') corroborate, so no other same-surname or near-name player outranks him.", "guards": "Top-1 must be the exact entity, not merely present in the list."}, {"id": "SRCH-03", "area": "Search", "title": "Flipped name order 'messi lionel' still resolves the same player", "priority": "medium", "precondition": "Active edition roster contains Lionel Messi.", "steps": ["Type 'messi lionel' (surname-first).", "Inspect the top Players result."], "expected": "Resolution is order-independent: Lionel Messi appears as the top player result, identical to SRCH-02. Token assignment is greedy/order-free.", "guards": "Score parity with the natural order — must be in top results, ideally #1."}, {"id": "SRCH-04", "area": "Search", "title": "Abbreviated 'L. Messi' (feed-style initial) resolves the full player", "priority": "medium", "precondition": "Active edition roster contains Lionel Messi (stored as 'L. Messi' or 'Lionel Messi').", "steps": ["Type 'L. Messi' into the search box.", "Inspect the top Players result."], "expected": "The 'L.' initial plus the full surname token resolves Messi as the top player result. The single-char initial alone is below threshold, but the surname token corroborates it.", "guards": "Confirm the dot/punctuation is normalized away and the initial maps to the first name."}, {"id": "SRCH-05", "area": "Search", "title": "Accent-insensitive: 'mbappe' (no accent) resolves 'Mbappé'", "priority": "high", "precondition": "Active edition roster contains Kylian Mbappé.", "steps": ["Type 'mbappe' (plain ASCII, no accent).", "Inspect the top Players result."], "expected": "Diacritics are folded during normalize, so 'mbappe' resolves Kylian Mbappé as the top player result.", "guards": "Top result name should display the accented 'Mbappé'."}, {"id": "SRCH-06", "area": "Search", "title": "Accented input 'mbappé' resolves identically to the unaccented form", "priority": "medium", "precondition": "Active edition roster contains Kylian Mbappé.", "steps": ["Type 'mbappé' (with the acute accent).", "Inspect the top Players result and compare with SRCH-05."], "expected": "Same top result as 'mbappe' — Kylian Mbappé. Accented and unaccented queries are equivalent after normalization.", "guards": "No empty result and no divergence from the unaccented form."}, {"id": "SRCH-07", "area": "Search", "title": "Surname prefix 'mbap' resolves Mbappé via prefix scoring", "priority": "medium", "precondition": "Active edition roster contains Mbappé.", "steps": ["Type 'mbap' (a real prefix of the surname).", "Inspect the Players group."], "expected": "Mbappé appears among the player results (prefix bonus). A genuine same-prefix player is acceptable, but a real Mbappé/prefix-bearing player must be present.", "guards": "Prefix must score above the 0.55 threshold; result not empty."}, {"id": "SRCH-08", "area": "Search", "title": "Adjacent-transposition typo 'halaand' resolves Haaland", "priority": "high", "precondition": "Active edition roster contains Erling Haaland.", "steps": ["Type 'halaand' (the 'aa' transposed).", "Inspect the top Players result."], "expected": "Damerau OSA distance counts the adjacent transposition as 1 edit, so Haaland resolves as the top player result for 'halaand'.", "guards": "Must clear threshold (scoreName('halaand','Erling Haaland') > 0.55). Confirms the transposition path, not generic Levenshtein."}, {"id": "SRCH-09", "area": "Search", "title": "One-char-deletion typo 'mbape' resolves Mbappé", "priority": "medium", "precondition": "Active edition roster contains Mbappé.", "steps": ["Type 'mbape' (one 'p' dropped).", "Inspect the top Players result."], "expected": "Single deletion on a >=5-char token is within typo tolerance, so 'mbape' resolves Mbappé as the top player result.", "guards": "5-char token still gets max=1 typo budget; result not empty."}, {"id": "SRCH-10", "area": "Search", "title": "Internal one-char typo on a longer surname (e.g. 'morals' -> Morales) resolves", "priority": "low", "precondition": "Active edition roster contains a player with a >=6-char surname (use a real one from the active roster; example pattern 'morales').", "steps": ["Identify a roster surname of length >=6.", "Type that surname with one letter deleted/changed (e.g. 'morals' for 'Morales').", "Inspect the Players group."], "expected": "The intended player is returned (single-typo on a long token still clears threshold, scoreName > 0.55).", "guards": "Pick a surname that does not collide with another roster name; assert the exact player appears."}, {"id": "SRCH-11", "area": "Search", "title": "Short ambiguous token 'kane' does NOT false-match 'Sané'", "priority": "high", "precondition": "Active edition roster contains both a 'Kane' and a 'Sané' (or at least a Sané-type near neighbor).", "steps": ["Type 'kane' (4-char token).", "Inspect every player in the dropdown's Players group."], "expected": "Results contain Kane (if present) but NEVER 'Sané'. Short (<5-char) tokens get zero typo budget, so 'kane' cannot fuzz into 'Sané' (scoreName('kane','Leroy Sané') < 0.55).", "guards": "This is the key false-positive guard. Inspect the full list, not just top-1 — Sané must be absent."}, {"id": "SRCH-12", "area": "Search", "title": "Full team name resolves the team as the top Teams result", "priority": "high", "precondition": "Active edition includes a known nation (e.g. 'Argentina' / 'Brazil').", "steps": ["Type a full nation name present in the active edition (e.g. 'argentina').", "Inspect the Teams group."], "expected": "The Teams group's top entry is that nation, with its flag and 3-letter code shown. Exact normalized name match scores 100.", "guards": "Assert team NAME/code, not just non-empty."}, {"id": "SRCH-13", "area": "Search", "title": "3-letter team code 'USA' resolves United States", "priority": "high", "precondition": "Active edition includes United States.", "steps": ["Type 'USA' (uppercase).", "Inspect the Teams group."], "expected": "United States is the top Teams result (exact-code match forces score 50). Also covered by the 'usa' alias mapping.", "guards": "Code match is case-insensitive (normalized). Result must be the USA team specifically."}, {"id": "SRCH-14", "area": "Search", "title": "3-letter team code 'ENG' resolves England", "priority": "medium", "precondition": "Active edition includes England.", "steps": ["Type 'ENG'.", "Inspect the Teams group."], "expected": "England is the top Teams result via exact country-code match (score 50).", "guards": "Confirms generic code path works beyond the USA alias special-case."}, {"id": "SRCH-15", "area": "Search", "title": "Country alias 'Holland' resolves Netherlands; 'Korea' resolves South Korea", "priority": "medium", "precondition": "Active edition includes Netherlands and/or South Korea.", "steps": ["Type 'holland' and inspect Teams group.", "Clear, type 'korea' and inspect Teams group."], "expected": "'holland' returns Netherlands; 'korea' returns South Korea (TEAM_ALIASES maps these). Each alias surfaces its real nation among the top team results.", "guards": "Only assert for nations actually present in the active edition; otherwise mark that alias N/A."}, {"id": "SRCH-16", "area": "Search", "title": "Team-name prefix returns the team (partial 'arge' -> Argentina)", "priority": "low", "precondition": "Active edition includes Argentina (or any nation; use its first 4 letters).", "steps": ["Type the first 4 letters of a nation's name (e.g. 'arge').", "Inspect the Teams group."], "expected": "The nation appears in the Teams group via prefix/startsWith bonus (e.g. 'arge' -> Argentina).", "guards": "Prefix must clear 0.55 threshold; assert the specific nation."}, {"id": "SRCH-17", "area": "Search", "title": "Two-char query returns NOTHING (Topbar minimum-length gate)", "priority": "medium", "precondition": "App running.", "steps": ["Type a single character then watch.", "Type a second character so the box holds exactly 2 chars (e.g. 'me').", "Observe whether a request fires / dropdown opens."], "expected": "Topbar only queries when trimmed length >= 2; a single char shows nothing. With 2 chars a request may fire but must never 500. No crash on any short fragment.", "guards": "Primary check is no error; secondary is that very short fragments don't spray unrelated false positives."}, {"id": "SRCH-18", "area": "Search", "title": "Garbage / no-match query degrades gracefully (no 500, 'Press Enter to ask')", "priority": "high", "precondition": "App running.", "steps": ["Type a nonsense string with no entity match (e.g. 'zzqwx').", "Observe the dropdown."], "expected": "The dropdown shows 'No matches. Press Enter to ask the AI.' Empty teams/players/matches arrays are returned, HTTP 200, no exception.", "guards": "Confirms the empty-result branch and that /api/search never throws."}, {"id": "SRCH-19", "area": "Search", "title": "Search never 500s even when fixtures have unresolved (TBD) sides", "priority": "high", "precondition": "Active edition has TBD knockout slots or a hollow live feed (homeTeamId/awayTeamId may be undefined). live-2026 before knockouts are seeded is ideal.", "steps": ["Type a team query that resolves to a side appearing in not-yet-determined knockout fixtures (e.g. a likely qualifier).", "Inspect the Matches group and confirm the response succeeded."], "expected": "HTTP 200, no crash. The Matches group only lists fixtures where BOTH sides resolve to real teams; any fixture with an undefined home/away is dropped (never rendered as undefined). This is the regression that once crashed /api/search.", "guards": "Verify network panel: /api/search returns 200, not 500. No 'cannot read properties of undefined' in console."}, {"id": "SRCH-20", "area": "Search", "title": "Search resolves against the ACTIVE edition's roster after switching tournaments", "priority": "high", "precondition": "At least two editions available with disjoint rosters (e.g. live-2026 vs a historical datahub edition like 1970).", "steps": ["On edition A, search a player unique to A and confirm a hit.", "Use the TournamentSwitcher to switch to edition B (which lacks that player).", "Search the same name again.", "Then search a player that exists only in edition B."], "expected": "After switching, the A-only player no longer resolves (empty or no exact hit), and the B-only player now resolves. Search is keyed to the active edition's store snapshot, not a stale index.", "guards": "Directly exercises the stale-index / snapshot-identity regression. Assert presence flips correctly both ways."}, {"id": "ASK-01", "area": "Ask (NLQ)", "title": "'highest xG among midfielders' returns a midfielder-filtered xG leaderboard", "priority": "high", "precondition": "Active edition exposes xG (e.g. sportmonks live-2026 or simulation). On a historical/no-xG edition expect the degrade case (see ASK-09).", "steps": ["Open /ask (or type the question in the Topbar and press Enter).", "Submit 'Who has the highest xG among midfielders?'", "Read the answer sentence and the evidence table."], "expected": "Intent = leaderboard. Answer names a player with team code and an xG value, phrased '… leads all Midfielders with <n> xG'. Every row in the table is a midfielder (position MF). Rows sorted descending by xG; top row matches the answer sentence. Numbers are sane (non-negative, finite).", "guards": "Spot-check at least one tabled player is genuinely a midfielder. The answer's named player == row #1."}, {"id": "ASK-02", "area": "Ask (NLQ)", "title": "'compare Messi and Mbappé' returns a two-player comparison with both entities", "priority": "high", "precondition": "Active edition roster contains both Messi and Mbappé.", "steps": ["Submit 'compare Messi and Mbappé'.", "Read the answer and the metric table."], "expected": "Intent = comparison. Both Messi and Mbappé are extracted (surname mention extraction). Table columns are the two players (team code + surname); rows cover Goals/Assists/xG/xA/Shots/Key passes/Prog. passes/Minutes. Answer declares the player with greater goal involvement (G+A). Values match each player's real stats.", "guards": "Both intended entities must appear — not two arbitrary players. If accents block one, that is a bug. Edge metric (G+A) determination must be consistent with the table."}, {"id": "ASK-03", "area": "Ask (NLQ)", "title": "'compare Messi vs Mbappé' (vs phrasing) behaves identically to 'compare'", "priority": "low", "precondition": "Active edition roster contains both players.", "steps": ["Submit 'Messi vs Mbappé'.", "Confirm intent and entities."], "expected": "The ' vs ' trigger routes to the comparison intent with both players, same structure as ASK-02.", "guards": "Confirms the alternate comparison trigger; both entities present."}, {"id": "ASK-04", "area": "Ask (NLQ)", "title": "'who will win the World Cup' returns a grounded title-odds ranking", "priority": "high", "precondition": "Active edition has forecasts (engine populated).", "steps": ["Submit 'Who will win the World Cup?'", "Read the answer and table."], "expected": "Intent = title-odds. Answer names the most-likely champion with a percentage, names the runner-up with its percentage, and cites the team count + simulation count. Table sorted descending by Win title%; #1 row == the named favourite. Probabilities are between 0% and 100%.", "guards": "Favourite in prose == row 1. Percentages well-formed (e.g. '24.3%'), monotonically non-increasing down the table."}, {"id": "ASK-05", "area": "Ask (NLQ)", "title": "'top scorers' returns the Golden Boot race", "priority": "medium", "precondition": "Active edition has the golden-boot projection populated.", "steps": ["Submit 'top scorers'.", "Read the answer and table."], "expected": "Intent = golden-boot. Answer names the leader with current goals, projected goals, and win probability. Table columns include Goals/xG/Proj./Win%. Leader in prose == row 1. Goal counts are integers and consistent with each player's stats.", "guards": "'top scorer', 'most goals', 'golden boot' must all route here. Numbers grounded, not placeholders."}, {"id": "ASK-06", "area": "Ask (NLQ)", "title": "'easiest path to the final' returns a knockout-path ranking", "priority": "medium", "precondition": "Active edition has a bracket and forecasts (reachFinal > 0). Pre-knockout editions may show 'Bracket not yet determined.'", "steps": ["Submit 'Which team has the easiest path to the final?'", "Read the answer and table."], "expected": "Intent = easiest-path. Answer names a team with an average projected opponent ELO and a reach-final percentage. Table columns: Team / Avg opp ELO / Reach final% / Win title%. Rows sorted ascending by Avg opp ELO (easiest first); #1 row == the named team. ELO values are realistic (~1400-2100).", "guards": "If the bracket is undetermined, the graceful 'Bracket not yet determined.' message is the acceptable degrade — not a crash. Otherwise assert ascending opponent ELO."}, {"id": "ASK-07", "area": "Ask (NLQ)", "title": "'best defense' returns the strongest-defense team ranking", "priority": "medium", "precondition": "Active edition has power rankings with defenseRating.", "steps": ["Submit 'best defense in the tournament'.", "Read the answer and table."], "expected": "Intent = best-defense. Answer names the team with the strongest defense and a rating out of 100. Table columns: Team / Offense / Defense / Power / Momentum, sorted descending by Defense; #1 row == named team.", "guards": "Spelling variants ('defence','meanest defense','best defense') route here. The named team must top the Defense column, not the Offense column."}, {"id": "ASK-08", "area": "Ask (NLQ)", "title": "Nonsense / unanswerable query falls back gracefully", "priority": "high", "precondition": "App running.", "steps": ["Submit a query with no detectable intent/entity (e.g. 'what is the meaning of life').", "Read the answer and follow-up chips."], "expected": "Intent = unknown. Answer is the graceful guidance message ('I couldn't map that to a specific analytic. Try asking about a metric leaderboard, a comparison, …'). No table rows. Follow-up suggestion chips are shown. No crash, HTTP 200.", "guards": "Must NOT hallucinate an entity (extractPlayers/extractTeam should not fire on ordinary words). Fallback chips present."}, {"id": "ASK-09", "area": "Ask (NLQ)", "title": "xG question on a historical edition that lacks xG degrades, does not show garbage", "priority": "high", "precondition": "Switch to a historical datahub edition (e.g. 1970) that has no xG metric.", "steps": ["Switch to a historical edition via TournamentSwitcher.", "Submit 'Who has the highest xG among midfielders?'", "Read the answer and table."], "expected": "The leaderboard still renders without crashing, but xG values fall back to 0 (metricValue returns 0 when the stat is absent) rather than NaN/undefined. Ideally the leader shown has 0.00 xG across the board, signalling the metric is unavailable for this edition rather than fabricating numbers.", "guards": "No NaN, no undefined, no 500. Degradation is the expected behavior, not a populated-but-fake xG column."}, {"id": "ASK-10", "area": "Ask (NLQ)", "title": "Ask resolves entities against the ACTIVE edition after switching tournaments", "priority": "high", "precondition": "Two editions with disjoint rosters available.", "steps": ["On edition A, submit 'compare <A-only player> and <another A player>' and confirm both resolve.", "Switch to edition B (which lacks those players).", "Submit the same comparison query."], "expected": "On edition B the A-only players no longer extract; the engine either falls back (unknown / single-entity lookup) or resolves B's roster — never returns the edition-A players. NLQ entity extraction is bound to the active store snapshot, identical to search.", "guards": "Confirms search + Ask share one resolver AND one active-edition store. No stale cross-edition entity leakage."}, {"id": "ASK-11", "area": "Ask (NLQ)", "title": "Per-90 leaderboard applies the minutes gate ('highest progressive passes per 90 among defenders')", "priority": "low", "precondition": "Active edition has per90 stats and minutes data.", "steps": ["Submit 'Highest progressive passes per 90 among defenders'.", "Inspect the table's Mins column."], "expected": "Intent = leaderboard with a '/90' metric column. Only defenders with >= 180 minutes appear (per90 path raises minMinutes to 180); column header shows 'Prog. passes/90'. Leader matches answer sentence; values are per-90 rates, not raw totals.", "guards": "Every tabled player has Mins >= 180 and position DF. Confirms the per90 minutes threshold is enforced (avoids tiny-sample outliers)."}, {"id": "ASK-12", "area": "Ask (NLQ)", "title": "Search box 'Press Enter to ask' handoff routes the query to /ask", "priority": "medium", "precondition": "App running.", "steps": ["Type a natural-language question into the Topbar (e.g. 'highest xG among midfielders').", "Press Enter (do not click a dropdown row)."], "expected": "Navigates to /ask?q=... and the AskClient auto-runs the query on mount, rendering the same grounded answer as ASK-01. Confirms the search-to-Ask bridge and that the shared resolver yields identical entity handling in both surfaces.", "guards": "URL contains the encoded query; answer renders without a manual re-submit."}, {"id": "GLOBE-01", "area": "Globe", "title": "3D globe loads and renders highlighted nations", "priority": "high", "precondition": "App running on a WebGL-capable desktop browser; any tournament active.", "steps": ["Navigate to /globe.", "Wait for the 'Rendering globe…' spinner to disappear.", "Observe the rendered sphere and country polygons."], "expected": "The dark globe renders with the teal atmosphere. Participating nations' polygons are raised and colored (their team color, ~cc alpha); non-participating countries are flat and dark (rgba(45,31,71,0.55)). The hint bar 'Drag to rotate · scroll to zoom · click a highlighted nation' is visible. No blank/black canvas.", "guards": "If features.length stays 0 the world-countries.json fetch failed — globe stays on the spinner. Verify /world-countries.json returns 200 and valid topojson."}, {"id": "GLOBE-02", "area": "Globe", "title": "Auto-rotate, manual rotate and zoom", "priority": "medium", "precondition": "/globe loaded with polygons visible, no country selected.", "steps": ["Observe the globe without touching it for a few seconds (auto-rotate at speed 0.45).", "Drag the globe to rotate manually.", "Scroll/pinch to zoom in and out."], "expected": "Globe auto-rotates while idle. Dragging rotates it smoothly; scrolling zooms the camera. Initial point-of-view frames lat 20/lng 0 at altitude 2.4. No jitter, no thrown WebGL errors in the console.", "guards": "Auto-rotate must stop when a nation is selected (see GLOBE-04) and resume on close."}, {"id": "GLOBE-03", "area": "Globe", "title": "Hover label shows flag + nation name only for participants", "priority": "low", "precondition": "/globe loaded.", "steps": ["Hover over a participating nation (e.g. the active tournament's host).", "Hover over a non-participating country (e.g. a country with no team)."], "expected": "Participating nation shows a tooltip with its flag emoji and full name. Non-participating country shows no label (empty string). Alias mapping resolves names like 'United States of America'→USA, 'Korea Republic'→South Korea, 'Cote d'Ivoire'→Ivory Coast, 'Czech Republic'→Czechia, 'Türkiye'→Turkey.", "guards": "keyFor() normalization/alias bugs surface here as a participant that won't highlight or label."}, {"id": "GLOBE-04", "area": "Globe", "title": "Select a nation opens the country detail panel and drills in", "priority": "high", "precondition": "/globe loaded with the live-2026 or a full edition active.", "steps": ["Click a highlighted participating nation.", "Observe the right-hand detail panel.", "Wait for the squad to load.", "Click a player row, then go back and click 'Full profile →'."], "expected": "Auto-rotate stops. Panel slides in showing flag, name, confederation (and Group if assigned). 'World Cup History' shows Titles/Runners-up/First/Best from wcHistory(code). Head Coach shows the manager or 'Not available on this feed' when manager is '—'/empty. Squad loads via /api/teams/[id], grouped GK/DF/MF/FW. A player row links to /players/[id]; 'Full profile →' links to /teams/[id]. No crash if squad is empty (shows 'No squad data on this feed.').", "guards": "Squad fetch reads j.data?.squad ?? [] — a 500 or missing data must yield empty list, not a crash. Closing (X) resets selection and resumes auto-rotate."}, {"id": "GLOBE-05", "area": "Globe", "title": "Selected nation is visually emphasized", "priority": "low", "precondition": "/globe loaded.", "steps": ["Select a nation.", "Compare its polygon to the others."], "expected": "The selected nation's polygon uses full team color (not the cc alpha) and a raised altitude (0.12 vs 0.05 for other participants, 0.008 for non-participants). Transition is animated (~300ms).", "guards": ""}, {"id": "GLOBE-06", "area": "Globe", "title": "No WebGL crash; graceful behavior without WebGL", "priority": "high", "precondition": "Desktop browser.", "steps": ["Load /globe normally and confirm it renders.", "Disable WebGL (or use a browser/profile without it) and reload /globe."], "expected": "With WebGL present, no console errors from three.js / react-globe.gl. With WebGL disabled, the page must not throw an uncaught client exception that blanks the whole app shell — the sidebar/topbar remain usable. (Globe is dynamically imported ssr:false so the server render never touches WebGL.)", "guards": "react-globe.gl touches window/WebGL; it is loaded via next/dynamic ssr:false — confirm no server-side WebGL reference error in logs."}, {"id": "GLOBE-07", "area": "Globe", "title": "Mobile / small viewport fallback and responsive sizing", "priority": "medium", "precondition": "Mobile viewport or narrow window (<= 640px).", "steps": ["Open /globe at a phone-width viewport.", "Select a nation and view the detail panel.", "Resize the window narrower and wider."], "expected": "Globe canvas resizes to its container via the ResizeObserver (no overflow/scrollbars on the globe wrapper). The detail panel becomes full-width (max-w-md / w-full) on small screens instead of a fixed 26rem rail, and its body scrolls. Globe remains interactive or degrades without crashing.", "guards": "Confirm the 78vh/min-h-520px container does not collapse to 0 height on mobile (would leave the globe invisible)."}, {"id": "SWITCH-01", "area": "Tournament Switcher", "title": "Dropdown lists ALL editions across all groups", "priority": "high", "precondition": "App running; /api/tournament returns the full registry.", "steps": ["Click the tournament pill in the topbar to open the dropdown.", "Scroll through every group: Live, Men's World Cup, Women's World Cup, Sandbox.", "Count the editions."], "expected": "Live group shows World Cup 2026 (live). Men's group includes 2022, 2018 plus historical men's editions. Women's group includes 2023, 2019 plus historical women's editions. Sandbox shows 'Simulated 2026'. The full list includes the ~27 historical 1930–2015 datahub editions, so the total is ~30+ entries. Each entry shows champion flag, label, and blurb.", "guards": "Grouping logic: live = coverage==='live'; sim = source==='simulation'; men/women = gender match AND source!=='simulation' AND coverage!=='live'. A historical edition mis-tagged would land in the wrong group or vanish."}, {"id": "SWITCH-02", "area": "Tournament Switcher", "title": "Long edition list SCROLLS within the dropdown (no off-screen overflow)", "priority": "high", "precondition": "Dropdown open with the full ~30-edition list.", "steps": ["Open the dropdown on a normal laptop screen.", "Scroll to the bottom of the list (the oldest 1930s editions).", "Repeat near the bottom of the viewport where the dropdown would overflow below the fold."], "expected": "The dropdown is height-capped (max-h-[75vh]) and scrolls internally (overflow-y-auto). The last/oldest editions are reachable by scrolling — none are clipped off-screen or unreachable. This is a regression guard: a long list once overflowed off-screen.", "guards": "Verify on a short viewport (e.g. 700px tall) that the bottom group is still scrollable into view."}, {"id": "SWITCH-03", "area": "Tournament Switcher", "title": "Switching an edition re-renders the whole app", "priority": "high", "precondition": "Active = live-2026; on the Home page.", "steps": ["Open the switcher and choose men-2022.", "Observe the spinner on the chosen row, then the pill label.", "Confirm the page content."], "expected": "POST /api/tournament {id:'men-2022'} succeeds; on ok the active state updates, dropdown closes, router.refresh() re-renders. The pill now reads 'World Cup 2022' with Argentina flag and the Radio live dot disappears. Home (and every page) now shows 2022 data. Choosing the already-active edition just closes the dropdown without a refetch.", "guards": "If the POST is not ok, active must NOT change (stays on previous edition). Spinner clears in the finally block regardless."}, {"id": "SWITCH-04", "area": "Tournament Switcher", "title": "Active edition is checkmarked; live edition shows the live dot", "priority": "low", "precondition": "Switcher data loaded.", "steps": ["Open the dropdown while live-2026 is active.", "Note the trailing icon on the active row and the pill.", "Switch to a non-live edition and reopen."], "expected": "The active row shows a Check icon. When live-2026 is active the pill shows the pulsing red Radio dot; on a non-live edition the dot is absent. The row currently being switched shows a spinner instead of the check.", "guards": ""}, {"id": "SWITCH-05", "area": "Tournament Switcher", "title": "Outside-click closes the dropdown", "priority": "low", "precondition": "Dropdown open.", "steps": ["Open the switcher.", "Click anywhere outside the dropdown."], "expected": "Dropdown closes (mousedown outside the ref container). Re-opening works.", "guards": ""}, {"id": "NAV-01", "area": "Navigation", "title": "Every sidebar link resolves (no 404 from nav)", "priority": "high", "precondition": "App running, desktop sidebar visible.", "steps": ["Click each link in Overview: World Explorer (/globe), Home (/), Guide (/guide), Live Center (/live), Matches (/matches), Teams (/teams), Players (/players).", "Click each in Analyze: Groups, Standings, Bracket, Predictions, Betting Edge, Analytics, Card Builder (/compare), Rankings.", "Click each in Discover: Discoveries, Club Connections (/clubs), Through the Years (/history), Storylines, AI Insights (/insights), Ask, Favorites."], "expected": "Every one of the 22 NAV entries navigates to a real page that renders content (not the 404 page, not a crash). The active link gets the accent highlight (left inset bar). Routes whose label differs from href resolve correctly: Card Builder→/compare, Club Connections→/clubs, Through the Years→/history.", "guards": "An href in nav.ts with no matching app/ route renders the 404 — that is a defect to log."}, {"id": "NAV-02", "area": "Navigation", "title": "Live Center nav badge and active-state matching", "priority": "low", "precondition": "Sidebar visible.", "steps": ["Observe the 'Live Center' link.", "Navigate to /matches and check which links are highlighted.", "Navigate to / (Home)."], "expected": "Live Center shows the pulsing 'Live' badge. Active matching: Home is active only on exact '/'; all other links active when pathname startsWith(href). Confirm e.g. /matches/[id] keeps Matches highlighted, and being on / does not falsely highlight other links.", "guards": "startsWith matching can over-highlight if one href is a prefix of another — none currently overlap, but re-check if routes are added."}, {"id": "NAV-03", "area": "Navigation", "title": "Topbar brand, search box, switcher, settings present", "priority": "medium", "precondition": "Any page.", "steps": ["Inspect the sticky topbar.", "Inspect the sidebar brand block."], "expected": "Topbar shows the search input with placeholder 'Search teams, players… or ask \"highest xG among midfielders?\"', the TournamentSwitcher pill, and a 'Settings' link (sm+). Sidebar brand shows the animated BrandMark, 'TASK Enterprises presents', 'World Cup Intelligence', 'Analytics Terminal'; clicking the brand returns to /.", "guards": ""}, {"id": "NAV-04", "area": "Navigation", "title": "Topbar search returns content-correct suggestions and Ask fallback", "priority": "medium", "precondition": "A populated edition active.", "steps": ["Type a 2+ char team name fragment in the search box.", "Type a player surname.", "Type gibberish, then press Enter."], "expected": "Debounced (~160ms) GET /api/search?q= populates grouped Teams/Players/Matches dropdowns with correct flags/codes; rows link to /teams/[id], /players/[id], /matches/[id]. Queries <2 chars show nothing. Gibberish shows 'No matches. Press Enter to ask the AI.' Pressing Enter routes to /ask?q=. Search must NOT 500 (WC-007 regression: TBD-fixture lookups).", "guards": "Aborted/in-flight requests must not crash; .catch swallows aborts."}, {"id": "NAV-05", "area": "Navigation", "title": "Mobile drawer opens, navigates, and closes", "priority": "medium", "precondition": "Mobile viewport (<1024px).", "steps": ["Tap the hamburger (top-left).", "Tap a nav link.", "Re-open and tap the backdrop / the X."], "expected": "Drawer slides in over a dimmed backdrop. Tapping a link navigates AND closes the drawer (onNavigate). Tapping the backdrop or X closes it. Desktop sidebar is hidden below lg; hamburger hidden at lg+.", "guards": ""}, {"id": "NAV-06", "area": "Navigation", "title": "Unknown route shows the 404 page, not a crash", "priority": "medium", "precondition": "App running.", "steps": ["Navigate to a nonexistent path, e.g. /does-not-exist.", "Navigate to /teams/not-a-real-id and /players/not-a-real-id."], "expected": "Unknown top-level path renders the app's not-found page within the shell (sidebar/topbar intact), not an unhandled exception. Unknown entity ids render a graceful not-found / empty state (getTeam/getPlayer return undefined — must be handled), never a white-screen crash.", "guards": "This is the undefined-lookup class: an entity page that does getTeam(id)! would crash here instead of 404."}, {"id": "NAV-07", "area": "Navigation", "title": "Loading states render during data fetch", "priority": "low", "precondition": "Throttled network or fresh server.", "steps": ["Open /globe (globe spinner), the switcher pill before /api/tournament resolves, and a globe country panel before squad loads."], "expected": "Globe shows 'Rendering globe…' spinner until polygons load. Switcher pill shows '🏆 Tournament' placeholder until the list loads. Country panel shows 'Loading squad…' spinner until /api/teams/[id] resolves. No layout jump that hides controls.", "guards": ""}, {"id": "XCUT-01", "area": "Cross-cutting", "title": "Tournament-switch matrix: live-2026 → men-2022 → women-2023 → 1990s → 1930s, spot-check core pages each hop", "priority": "high", "precondition": "Start on live-2026. Have /, /teams, /players, /standings, /matches open in mind for each hop.", "steps": ["Switch to men-2022; load /, /teams, /players, /standings, /matches.", "Switch to women-2023; reload the same five pages.", "Switch to a 1990s historical edition (e.g. 1994/1998); reload the five pages.", "Switch to a 1930s historical edition (e.g. 1930/1934); reload the five pages.", "Switch back to live-2026; reload the five pages."], "expected": "After EACH switch, every page shows the NEW edition's data: teams list belongs to that edition (e.g. 2022 has Argentina champions; 1930 has the original 13), players are that edition's squads, standings/matches are that edition's fixtures with that edition's results. No page shows the previous edition's rows or renders empty. This is the WC-008 regression guard — snapshot-keyed indexes must rebuild on the globalThis snapshot swap so getTeam/getPlayer don't miss every lookup.", "guards": "The classic failure: getTeams()/getPlayers() return the new snapshot's rows while getTeam()/getPlayer() hit a STALE index → lists populate but detail/lookups miss and surfaces render empty. Spot-check at least one detail page (/teams/[id]) per hop, not just lists."}, {"id": "XCUT-02", "area": "Cross-cutting", "title": "Tournament switch rebuilds analytics engine and percentiles", "priority": "high", "precondition": "On live-2026, note a value on /analytics or /rankings (e.g. a top scorer / percentile).", "steps": ["Visit /analytics, /rankings, /predictions, /bracket on live-2026.", "Switch to men-2022 and revisit all four.", "Switch to women-2023 and revisit all four."], "expected": "Derived/analytics surfaces (rankings, predictions, bracket seeds, percentile tables) recompute against the new edition — no carried-over numbers from the prior tournament. setDataset clears _percentileCache and the __wcEngine global on every swap.", "guards": "Bracket must not crash on TBD seeds mid-switch (WC-004); /predictions must not crash on a group-base lookup gap (WC-018)."}, {"id": "XCUT-03", "area": "Cross-cutting", "title": "Live-load window: no page crashes within ~60s of a fresh deploy / cold start", "priority": "high", "precondition": "Fresh deploy or freshly restarted server with DATA_SOURCE=sportmonks so live-2026 is mid-loading; act within the first ~60s.", "steps": ["Immediately hit /, then /live, /matches, a /matches/[id] (including a knockout/TBD fixture), /standings, /rankings, /bracket, /insights, /storylines.", "Run a search from the topbar during the same window."], "expected": "Not one of these pages throws a client-side exception or returns a 500, even while teams/players/fixtures are still resolving and knockout fixtures are TBD. Pages may show partial/loading content but must degrade gracefully. This exercises the #1 bug class: undefined entity lookups (WC-002/003/004/007). Rule: no `!` non-null assertion on a team/player lookup.", "guards": "getPlayerView returns undefined when its team is unresolved (must omit, not crash). MatchCard / live / matchDetail must filter or guard TBD fixtures. /api/search must resolve both sides up front and drop unresolved fixtures (WC-007)."}, {"id": "XCUT-04", "area": "Cross-cutting", "title": "Match-state matrix: scheduled / live / halftime / finished labels are correct", "priority": "high", "precondition": "An edition with fixtures in multiple states (live-2026 during play, or simulate states).", "steps": ["Open a SCHEDULED fixture, a LIVE fixture, a HALFTIME fixture, and a FINISHED fixture (match card + /matches/[id]).", "Read each match's summary/narrative and status label."], "expected": "Scheduled: future tense / no result. Live & Halftime: present-tense narrative, no team described as having 'won' (WC-013). Finished: past tense, winner stated only here. Scores/minute reflect the actual state. Live timeline grows on refresh; finished shows final events.", "guards": "generateMatchSummary must branch LIVE/HALFTIME separately from FINISHED."}, {"id": "XCUT-05", "area": "Cross-cutting", "title": "Timezone: kickoff DAY and time correct everywhere from a non-UTC machine", "priority": "high", "precondition": "Set the test machine/browser to a non-UTC zone that flips the calendar day vs UTC (e.g. America/Los_Angeles for an evening NA kickoff).", "steps": ["View kickoff times on /matches, /matches/[id], /live, home upcoming, and any fixture list.", "Cross-check the displayed DAY and time against the true local kickoff."], "expected": "Every date/time is rendered in the viewer's own timezone via <LocalTime>. An evening North-American kickoff must NOT roll to 'tomorrow 1pm' (WC-011). Both the day-of-week/date AND the clock time are correct, consistently across all surfaces.", "guards": "Check that no surface still hardcodes timeZone:'UTC'. The day is the trap, not just the time."}, {"id": "XCUT-06", "area": "Cross-cutting", "title": "Hollow live feed falls back to the full simulation (not a blank app)", "priority": "high", "precondition": "Force a hollow live response: live feed returns teams/fixtures but few/no squads (<80% teams with squads or <=100 players) — e.g. quota/key/plan failure on the squad calls.", "steps": ["Activate live-2026 under the hollow condition.", "Load /, /teams, /players, /standings, /matches.", "Open the tournament switcher pill."], "expected": "isHealthyLive() detects the hollow snapshot and activateTournament serves the complete built-in simulation labeled 'Simulation (live feed unavailable)' instead of a blank/br
